<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>關於我轉生成為古代大神這檔事</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap");

:root {
  --ink: #201912;
  --paper: #fffaf0;
  --gold: #f4d778;
  --amber: #bf8640;
  --red: #b94a38;
  --line: rgba(54, 41, 24, .15);
  --shadow: rgba(60, 45, 24, .18);
  --scene-background: url("assets/bg.png");
}

* { box-sizing: border-box; }
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
body {
  color: var(--ink);
  font-family: "Zen Maru Gothic", "Noto Serif TC", "Microsoft JhengHei", sans-serif;
  background: #f7f1df;
}
button, input { font: inherit; }

.app {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background-image:
    linear-gradient(180deg, rgba(255, 252, 241, .12), rgba(231, 214, 176, .16)),
    var(--scene-background);
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
}
.app::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255, 252, 244, .24) 0%, rgba(255, 252, 244, .04) 38%, rgba(18, 37, 42, .12) 100%),
    radial-gradient(circle at 50% 8%, rgba(255, 255, 255, .5), transparent 36%);
  pointer-events: none;
}
.ink-mountain,
.ink-mountain::before,
.ink-mountain::after {
  position: absolute;
  content: "";
  left: -4vw;
  right: -4vw;
  bottom: 0;
  height: 48vh;
  pointer-events: none;
  background:
    linear-gradient(135deg, transparent 0 18%, rgba(76, 64, 48, .11) 18% 25%, transparent 25% 40%, rgba(52, 48, 39, .13) 40% 48%, transparent 48% 63%, rgba(76, 58, 38, .12) 63% 72%, transparent 72%),
    linear-gradient(0deg, rgba(255, 250, 232, .62), transparent 52%);
  clip-path: polygon(0 78%, 8% 64%, 16% 75%, 27% 45%, 38% 72%, 48% 40%, 61% 68%, 72% 34%, 84% 70%, 94% 52%, 100% 75%, 100% 100%, 0 100%);
  filter: blur(4px);
}
.ink-mountain::before {
  inset: auto -4vw -2vh -4vw;
  height: 34vh;
  opacity: .45;
  transform: scaleX(-1);
  filter: blur(10px);
}
.ink-mountain::after {
  inset: auto -4vw -10vh -4vw;
  height: 30vh;
  opacity: .55;
  clip-path: ellipse(42% 18% at 50% 50%);
  background: rgba(126, 101, 55, .18);
  filter: blur(18px);
}
.ink-mountain,
.moon { display: none; }
.moon {
  position: absolute;
  left: 50%;
  top: 14%;
  width: min(28vw, 380px);
  aspect-ratio: 1;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255, 255, 255, .94), rgba(255, 249, 220, .62) 56%, rgba(244, 215, 120, .08) 72%, transparent 74%);
  opacity: .95;
}

.topbar {
  position: absolute;
  z-index: 8;
  top: 18px;
  left: clamp(20px, 2.5vw, 48px);
  right: clamp(20px, 2.5vw, 48px);
  min-height: 94px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
  align-items: start;
  pointer-events: none;
}
.brand {
  grid-column: 2;
  pointer-events: auto;
  text-align: center;
}
.brand h1 {
  margin: 0;
  font-family: "Noto Serif TC", serif;
  font-size: clamp(30px, 2.8vw, 54px);
  line-height: 1;
  font-weight: 900;
  letter-spacing: .025em;
  white-space: nowrap;
  text-shadow: 0 2px 18px rgba(255, 255, 255, .82);
}
.controls {
  grid-column: 3;
  justify-self: end;
  pointer-events: auto;
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
  align-items: center;
  max-width: 680px;
  opacity: .52;
  transition: opacity .18s;
}
.controls:hover,
.controls.open { opacity: 1; }
.chip,
.ghost {
  min-height: 38px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 253, 245, .68);
  color: rgba(32, 25, 18, .74);
  font-weight: 900;
  backdrop-filter: blur(14px);
  box-shadow: 0 14px 30px rgba(80, 56, 24, .08);
}
button.ghost { cursor: pointer; }
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 7px;
  background: #7e9654;
  box-shadow: 0 0 14px rgba(126, 150, 84, .55);
}
.dot.off {
  background: #c35445;
  box-shadow: 0 0 14px rgba(195, 84, 69, .45);
}

.stage {
  position: absolute;
  z-index: 2;
  left: clamp(16px, 2vw, 42px);
  right: clamp(16px, 2vw, 42px);
  top: 84px;
  bottom: clamp(14px, 2.5vh, 28px);
  border: 1px solid rgba(60, 45, 24, .1);
  border-radius: clamp(26px, 2.2vw, 42px);
  background: linear-gradient(180deg, rgba(255, 255, 250, .28), rgba(240, 226, 198, .18));
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .48), 0 30px 90px rgba(24, 45, 49, .16);
  backdrop-filter: blur(2px) saturate(.92);
  overflow: hidden;
}
.stage::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 24% 30%, rgba(255, 239, 166, .35), transparent 21%),
    radial-gradient(circle at 76% 28%, rgba(255, 255, 255, .48), transparent 24%),
    linear-gradient(115deg, transparent, rgba(255, 255, 255, .42) 45%, transparent 56%);
  opacity: .72;
}

/*
  The stage is a real grid instead of a set of percentage coordinates.
  Every character owns one cell, so larger rebirth images can never collide
  with another group. Twelve columns let the five-item second row stay centered.
*/
.field {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  grid-template-rows: repeat(2, minmax(0, 1fr));
  gap: clamp(8px, 1.3vh, 18px) clamp(2px, .5vw, 10px);
  padding: clamp(24px, 3vh, 38px) clamp(12px, 2.8vw, 54px) clamp(16px, 2.3vh, 28px);
}
.person {
  position: relative;
  grid-column: var(--column) / span 2;
  grid-row: var(--row);
  align-self: stretch;
  justify-self: center;
  width: min(100%, 190px);
  min-width: 0;
  isolation: isolate;
  opacity: 1;
  transform: translateY(0);
  transition: opacity .45s, transform .65s cubic-bezier(.2, .8, .2, 1);
}
.aura {
  position: absolute;
  z-index: -2;
  left: 50%;
  top: 48%;
  width: min(calc(108px * var(--aura)), 94%);
  aspect-ratio: 1;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255, 255, 255, .82) 0 25%, rgba(255, 232, 132, .45) 42%, rgba(247, 197, 80, .17) 62%, transparent 73%);
  filter: blur(1px);
  opacity: calc(.28 + var(--power) * .6);
  box-shadow: 0 0 calc(34px * var(--aura)) rgba(247, 214, 110, .32);
  transition: width 1.2s, opacity 1s;
}
.person.final .aura {
  background: radial-gradient(circle, rgba(255, 255, 255, .9) 0 19%, rgba(255, 225, 108, .55) 36%, rgba(255, 173, 60, .18) 54%, transparent 74%);
  box-shadow: 0 0 calc(50px * var(--aura)) rgba(255, 207, 84, .46);
}
.avatar-wrap {
  position: absolute;
  left: 50%;
  top: 8px;
  bottom: 58px;
  width: 96%;
  transform: translateX(-50%);
  display: grid;
  place-items: end center;
}
.avatar {
  display: block;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 20px 18px rgba(30, 24, 17, .2));
  transition: opacity .55s, filter .55s, transform .8s;
}
.transformation-media {
  position: absolute;
  z-index: 12;
  left: 50%;
  top: 50%;
  width: min(calc(100% + clamp(20px, 2vw, 40px)), 230px);
  aspect-ratio: 9 / 16;
  overflow: hidden;
  border: 1px solid rgba(226, 213, 255, .52);
  border-radius: clamp(12px, 1.2vw, 22px);
  background: #11141c;
  box-shadow: 0 16px 34px rgba(19, 13, 29, .38), 0 0 28px rgba(119, 82, 195, .3);
  opacity: 0;
  transform: translate(-50%, -50%) scale(.86);
  pointer-events: none;
}
.transform-video {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}
.person.transforming .transformation-media {
  animation: transformationVideo var(--transformation-duration, 6.8s) ease-in-out both;
}
.person.video-failed .transformation-media { display: none; }
.identity {
  position: absolute;
  z-index: 14;
  left: 50%;
  bottom: 0;
  width: max-content;
  max-width: calc(100% - 6px);
  transform: translateX(-50%);
  text-align: center;
}
.label {
  min-width: 78px;
  padding: 5px 12px;
  border: 1px solid rgba(62, 48, 28, .16);
  border-radius: 999px;
  background: rgba(255, 255, 250, .88);
  box-shadow: 0 10px 24px rgba(60, 45, 24, .12);
  font-size: clamp(12px, 1vw, 14px);
  font-weight: 900;
  white-space: nowrap;
  backdrop-filter: blur(12px);
}
.stage-name {
  margin-top: 4px;
  color: rgba(32, 25, 18, .66);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .08em;
  white-space: nowrap;
  text-shadow: 0 1px 10px rgba(255, 255, 255, .86);
}
.strike, .smoke, .final-burst {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.strike { z-index: 5; opacity: 0; }
.strike::before {
  content: "";
  position: absolute;
  left: 50%;
  top: -10%;
  width: 18px;
  height: 100%;
  background: linear-gradient(180deg, transparent, #fff 18%, #ffe170 31%, #fff 46%, transparent 62%);
  clip-path: polygon(54% 0, 100% 0, 62% 32%, 88% 32%, 28% 100%, 43% 52%, 15% 52%);
  filter: drop-shadow(0 0 18px #fff) drop-shadow(0 0 30px #f3c54d);
  transform: translateX(-50%) scaleY(.8);
}
.smoke { z-index: 4; opacity: 0; }
.smoke::before,
.smoke::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 255, 255, .86), rgba(236, 221, 184, .36) 45%, transparent 72%);
  filter: blur(8px);
}
.smoke::before { left: 2%; right: 2%; bottom: 16%; height: 44%; }
.smoke::after { left: 18%; right: 18%; bottom: 8%; height: 30%; animation-delay: .15s; }
.person.transforming .strike { animation: strikeDown 5s ease-in-out both; }
.person.transforming .smoke { animation: smokeRise 5s ease-in-out both; }
.person.transforming .avatar { animation: bodyFlash var(--transformation-duration, 6.8s) ease-in-out both; }
.person.final .final-burst::before,
.person.final .final-burst::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 48%;
  width: 102%;
  aspect-ratio: 1;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  border: 1px solid rgba(255, 211, 94, .38);
  animation: spinAura 8s linear infinite;
}
.person.final .final-burst::after {
  width: 78%;
  animation-duration: 5.5s;
  animation-direction: reverse;
}

.gate {
  position: fixed;
  z-index: 60;
  inset: 0;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at 50% 30%, rgba(255, 255, 255, .9), rgba(232, 207, 142, .72) 44%, rgba(118, 88, 45, .5));
  backdrop-filter: blur(10px);
}
.gate-card {
  width: min(430px, calc(100vw - 36px));
  padding: 30px;
  border: 1px solid rgba(85, 62, 31, .14);
  border-radius: 30px;
  background: rgba(255, 253, 246, .9);
  box-shadow: 0 34px 90px rgba(60, 45, 24, .24);
  text-align: center;
}
.gate-card small {
  display: block;
  margin-bottom: 12px;
  color: rgba(32, 25, 18, .45);
  font-weight: 900;
  letter-spacing: .28em;
}
.gate-card h2 {
  margin: 0 0 20px;
  font-family: "Noto Serif TC", serif;
  font-size: 32px;
  letter-spacing: .08em;
}
.gate-card input {
  width: 100%;
  height: 58px;
  margin-bottom: 14px;
  padding: 0 18px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, .76);
  font-size: 22px;
  font-weight: 900;
  text-align: center;
  letter-spacing: .26em;
  outline: none;
}
.gate-card input:focus {
  box-shadow: 0 0 0 4px rgba(191, 134, 64, .16);
  border-color: rgba(191, 134, 64, .38);
}
.gate-card button, .primary {
  height: 52px;
  padding: 0 20px;
  border: 1px solid rgba(168, 110, 40, .24);
  border-radius: 999px;
  background: linear-gradient(135deg, #ffe57d, #d79e45);
  font-weight: 900;
  cursor: pointer;
  color: #201912;
}
.danger { background: rgba(185, 74, 56, .08); color: #8d3025; }
.hide { display: none !important; }
.toast {
  position: fixed;
  z-index: 80;
  left: 50%;
  bottom: 24px;
  transform: translate(-50%, 18px);
  padding: 12px 18px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255, 253, 246, .92);
  box-shadow: 0 18px 48px rgba(60, 45, 24, .2);
  font-weight: 900;
  opacity: 0;
  transition: .2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }

@keyframes auraPulse {
  0%, 100% { filter: blur(1px); transform: translate(-50%, -50%) scale(1); }
  50% { filter: blur(3px); transform: translate(-50%, -50%) scale(1.06); }
}
@keyframes strikeDown {
  0%, 12%, 100% { opacity: 0; }
  18%, 32% { opacity: 1; }
  35%, 70% { opacity: .38; }
}
@keyframes smokeRise {
  0%, 14%, 100% { opacity: 0; transform: translateY(16px) scale(.7); }
  28%, 72% { opacity: .92; transform: translateY(-16px) scale(1.2); }
  86% { opacity: .2; transform: translateY(-38px) scale(1.55); }
}
@keyframes bodyFlash {
  0%, 100% { opacity: 1; filter: drop-shadow(0 20px 18px rgba(30, 24, 17, .2)); }
  20%, 58% { opacity: .2; filter: drop-shadow(0 0 30px rgba(255, 232, 132, .9)) brightness(1.8); }
}
@keyframes transformationVideo {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(.86); filter: brightness(.5); }
  3%, 96% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.04); filter: brightness(1.18); }
}
@keyframes spinAura {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

@media (max-width: 1180px) {
  .topbar { min-height: 64px; }
  .brand h1 { font-size: clamp(28px, 3vw, 38px); }
  .controls { opacity: .86; max-width: 470px; }
  .chip, .ghost { min-height: 34px; padding: 0 11px; font-size: 12px; }
  .stage { top: 72px; }
  .field { padding-inline: 10px; }
  .person { width: min(100%, 158px); }
  .avatar-wrap { width: 94%; }
}
@media (max-height: 720px) {
  .topbar { top: 10px; }
  .brand h1 { font-size: clamp(27px, 3vw, 38px); }
  .stage { top: 74px; bottom: 10px; }
  .field { padding-block: 12px; gap: 6px 2px; }
  .avatar-wrap { top: 5px; bottom: 52px; }
}
@media (max-width: 760px) {
  .topbar { display: flex; justify-content: space-between; align-items: flex-start; }
  .brand { text-align: left; }
  .brand h1 { font-size: clamp(22px, 3.7vw, 28px); }
  .controls .chip:nth-child(2),
  #copyLinkBtn { display: none; }
  .stage { top: 76px; }
  .person { width: 100%; }
  .label { min-width: 0; padding: 4px 7px; font-size: 10px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    scroll-behavior: auto !important;
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
  }
  .person.transforming .transformation-media,
  .person.transforming .avatar {
    animation-duration: var(--transformation-duration, 6.8s) !important;
  }
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="moon"></div>
  <div class="ink-mountain"></div>
  <header class="topbar">
    <div class="brand"><h1>關於我轉生成為古代大神這檔事</h1></div>
    <div class="controls" id="controls">
      <span class="chip"><span class="dot off" id="statusDot"></span><span id="statusText">連線中</span></span>
      <span class="chip">房間 <span id="roomText">-</span></span>
      <button class="ghost" id="copyLinkBtn" type="button">加分連結</button>
    </div>
  </header>
  <main class="stage"><section class="field" id="field" aria-label="轉生角色"></section></main>
</div>

<section class="gate" id="gate">
  <form class="gate-card" id="gateForm">
    <small>LOCKED STAGE</small>
    <h2>輸入密碼進入</h2>
    <input id="passwordInput" type="password" inputmode="numeric" autocomplete="current-password" aria-label="舞台密碼" autofocus>
    <button type="submit">進入舞台</button>
  </form>
</section>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD5ytWrUOI6UIUBIcKpF3fyODQR2pXFMmY",
  authDomain: "score-calculation-ef584.firebaseapp.com",
  databaseURL: "https://score-calculation-ef584-default-rtdb.firebaseio.com",
  projectId: "score-calculation-ef584",
  storageBucket: "score-calculation-ef584.firebasestorage.app",
  messagingSenderId: "634074718336",
  appId: "1:634074718336:web:38960860ad796197a50665",
  measurementId: "G-R6NT2QJQSC"
};

const PASSWORD = "184179";
const GROUP_COUNT = 11;
const CN = ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一"];
const ASSET_ROOT = "assets/";
const TRANSFORMATION_VIDEO = `${ASSET_ROOT}change-web.mp4`;
document.documentElement.style.setProperty("--scene-background", `url("${ASSET_ROOT}bg.png")`);
const STAGES = [
  { threshold: 0, name: "初生", image: `${ASSET_ROOT}rebirth-stage-1.png` },
  { threshold: 221, name: "覺醒", image: `${ASSET_ROOT}rebirth-stage-2.png` },
  { threshold: 441, name: "修心", image: `${ASSET_ROOT}rebirth-stage-3.png` },
  { threshold: 661, name: "執劍", image: `${ASSET_ROOT}rebirth-stage-4.png` },
  { threshold: 881, name: "立德", image: `${ASSET_ROOT}rebirth-stage-5.png` },
  { threshold: 1101, name: "立功", image: `${ASSET_ROOT}rebirth-stage-6.png` },
  { threshold: 1321, name: "立言", image: `${ASSET_ROOT}rebirth-stage-7.png` },
  { threshold: 1541, name: "古神", image: `${ASSET_ROOT}rebirth-stage-8.png` }
];
const SLOTS = Array.from({ length: GROUP_COUNT }, (_, index) => index < 6
  ? { row: 1, column: index * 2 + 1 }
  : { row: 2, column: (index - 6) * 2 + 2 });

const field = document.getElementById("field");
const gate = document.getElementById("gate");
const gateForm = document.getElementById("gateForm");
const passwordInput = document.getElementById("passwordInput");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const roomText = document.getElementById("roomText");
const toast = document.getElementById("toast");

let room = "";
let scores = emptyScores();
let database = null;
let scoresRef = null;
let hydrated = false;
const nodes = new Map();
const stageByGroup = new Map();
const transformTargetByGroup = new Map();
const timers = new Map();
const processedImages = new Map();

function emptyScores() {
  return Object.fromEntries(Array.from({ length: GROUP_COUNT }, (_, i) => [String(i + 1), 0]));
}
function groupName(id) {
  return `第${CN[Number(id) - 1]}組`;
}
function normalizePassword(value) {
  return String(value || "").replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 65248)).trim();
}
function toastMessage(message) {
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(toastMessage.timer);
  toastMessage.timer = setTimeout(() => toast.classList.remove("show"), 1800);
}
function validRoom(value) {
  return /^[A-Za-z0-9_-]{1,80}$/.test(value);
}
function getRoom() {
  const url = new URL(location.href);
  const supplied = url.searchParams.get("room");
  if (supplied && validRoom(supplied)) return supplied;
  const next = `rebirth_${Math.random().toString(36).slice(2, 8)}`;
  url.searchParams.set("room", next);
  history.replaceState(null, "", url);
  return next;
}
function getStage(score) {
  let found = STAGES[0];
  let index = 0;
  STAGES.forEach((stage, i) => {
    if (score >= stage.threshold) {
      found = stage;
      index = i;
    }
  });
  return { ...found, index };
}
function cleanScores(raw) {
  const next = emptyScores();
  if (raw && typeof raw === "object") {
    Object.keys(next).forEach(key => {
      next[key] = Math.max(0, Number(raw[key]) || 0);
    });
  }
  return next;
}
function powerFor(item) {
  return Math.max(.12, Math.min(1, item.score / 1541));
}
function auraFor(item) {
  if (item.score <= 0) return .48;
  return .72 + powerFor(item) * 1.08 + (item.stage.index === STAGES.length - 1 ? .28 : 0);
}
function transparentAsset(source) {
  if (processedImages.has(source)) return processedImages.get(source);
  const promise = new Promise(resolve => {
    const image = new Image();
    image.crossOrigin = "anonymous";
    image.onload = () => {
      try {
        const canvas = document.createElement("canvas");
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(image, 0, 0);
        const pixels = context.getImageData(0, 0, canvas.width, canvas.height);
        const data = pixels.data;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i + 1], b = data[i + 2];
          const max = Math.max(r, g, b), min = Math.min(r, g, b);
          const pale = max >= 224 && max - min <= 34;
          if (pale) data[i + 3] = 0;
        }
        context.putImageData(pixels, 0, 0);
        resolve(canvas.toDataURL("image/png"));
      } catch (error) {
        console.warn("image processing fallback", error);
        resolve(source);
      }
    };
    image.onerror = () => resolve(source);
    image.src = source;
  });
  processedImages.set(source, promise);
  return promise;
}
async function setImage(img, source) {
  img.dataset.target = source;
  const src = await transparentAsset(source);
  if (img.dataset.target === source) img.src = src;
}
function createNode(id) {
  const slot = SLOTS[Number(id) - 1];
  const el = document.createElement("article");
  el.className = "person";
  el.style.setProperty("--row", slot.row);
  el.style.setProperty("--column", slot.column);
  el.style.setProperty("--aura", .5);
  el.style.setProperty("--power", .2);
  el.innerHTML = `
    <div class="aura"></div>
    <div class="final-burst"></div>
    <div class="strike"></div>
    <div class="smoke"></div>
    <div class="transformation-media" aria-hidden="true">
      <video class="transform-video" src="${TRANSFORMATION_VIDEO}" preload="auto" muted playsinline></video>
    </div>
    <div class="avatar-wrap"><img class="avatar" alt="${groupName(id)}"></div>
    <div class="identity">
      <div class="label">${groupName(id)}</div>
      <div class="stage-name"></div>
    </div>`;
  field.appendChild(el);
  const node = {
    el,
    img: el.querySelector("img"),
    video: el.querySelector(".transform-video"),
    stageName: el.querySelector(".stage-name"),
    transformToken: null,
    transformEndHandler: null
  };
  node.video.addEventListener("error", () => el.classList.add("video-failed"));
  node.video.addEventListener("loadedmetadata", () => {
    if (Number.isFinite(node.video.duration) && node.video.duration > 0) {
      el.style.setProperty("--transformation-duration", `${node.video.duration}s`);
    }
  });
  node.video.load();
  nodes.set(id, node);
  return node;
}
function renderPeople() {
  for (let i = 1; i <= GROUP_COUNT; i++) {
    const id = String(i);
    const score = Number(scores[id]) || 0;
    const item = { id, score, stage: getStage(score) };
    const node = nodes.get(id) || createNode(id);
    const stage = item.stage;
    const oldIndex = stageByGroup.has(id) ? stageByGroup.get(id) : stage.index;

    node.el.classList.toggle("final", stage.index === STAGES.length - 1);
    node.el.style.setProperty("--aura", auraFor(item).toFixed(2));
    node.el.style.setProperty("--power", powerFor(item).toFixed(2));

    if (transformTargetByGroup.get(id) === stage.index) continue;
    if (!hydrated || stage.index <= oldIndex) {
      clearTransform(id);
      stageByGroup.set(id, stage.index);
      node.stageName.textContent = stage.name;
      setImage(node.img, stage.image);
      continue;
    }
    playTransform(id, node, stage);
  }
  hydrated = true;
}
function waitForVideoReady(video, timeoutMs = 12000) {
  if (video.readyState >= HTMLMediaElement.HAVE_FUTURE_DATA) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const cleanup = () => {
      clearTimeout(timeout);
      video.removeEventListener("canplay", ready);
      video.removeEventListener("error", failed);
    };
    const ready = () => {
      cleanup();
      resolve();
    };
    const failed = () => {
      cleanup();
      reject(video.error || new Error("變身影片載入失敗"));
    };
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error("變身影片載入逾時"));
    }, timeoutMs);
    video.addEventListener("canplay", ready);
    video.addEventListener("error", failed);
    video.load();
  });
}
function clearTransform(id) {
  const timer = timers.get(id);
  if (timer) {
    timer.forEach(clearTimeout);
    timers.delete(id);
  }
  transformTargetByGroup.delete(id);
  const node = nodes.get(id);
  if (!node) return;
  node.transformToken = null;
  if (node.transformEndHandler) {
    node.video.removeEventListener("ended", node.transformEndHandler);
    node.transformEndHandler = null;
  }
  node.el.classList.remove("transforming", "video-failed");
  node.video.pause();
  if (node.video.readyState > 0) node.video.currentTime = 0;
}
async function playTransform(id, node, stage) {
  clearTransform(id);
  const token = Symbol(`transform-${id}-${stage.index}`);
  node.transformToken = token;
  transformTargetByGroup.set(id, stage.index);
  transparentAsset(stage.image);

  const finish = () => {
    if (node.transformToken !== token) return;
    const timer = timers.get(id);
    if (timer) timer.forEach(clearTimeout);
    timers.delete(id);
    if (node.transformEndHandler) {
      node.video.removeEventListener("ended", node.transformEndHandler);
      node.transformEndHandler = null;
    }
    setImage(node.img, stage.image);
    stageByGroup.set(id, stage.index);
    node.stageName.textContent = stage.name;
    node.el.classList.remove("transforming", "video-failed");
    node.video.pause();
    if (node.video.readyState > 0) node.video.currentTime = 0;
    node.transformToken = null;
    transformTargetByGroup.delete(id);
  };
  const lightningFallback = error => {
    if (node.transformToken !== token) return;
    console.warn("transformation video fallback", error);
    node.el.classList.add("video-failed", "transforming");
    timers.set(id, [setTimeout(finish, 5200)]);
  };

  try {
    await waitForVideoReady(node.video);
    if (node.transformToken !== token) return;
    node.video.currentTime = 0;
    await node.video.play();
    if (node.transformToken !== token) {
      node.video.pause();
      return;
    }
    node.el.classList.add("transforming");
    node.transformEndHandler = finish;
    node.video.addEventListener("ended", finish, { once: true });
    const durationMs = Number.isFinite(node.video.duration) && node.video.duration > 0
      ? node.video.duration * 1000
      : 6800;
    timers.set(id, [setTimeout(finish, durationMs + 5000)]);
  } catch (error) {
    lightningFallback(error);
  }
}
function scoreLink() {
  const url = new URL(location.href);
  url.pathname = url.pathname.replace(/rebirth_rank\.html$/, "rebirth_score_input.html");
  url.searchParams.set("room", room);
  return url.toString();
}
async function copyScoreLink() {
  const link = scoreLink();
  try {
    await navigator.clipboard.writeText(link);
    toastMessage("已複製加分連結");
  } catch {
    prompt("加分連結", link);
  }
}
function unlock() {
  sessionStorage.setItem(`rebirthUnlocked:${room}`, "true");
  gate.classList.add("hide");
  startFirebase();
}
function setConnection(ok) {
  statusDot.classList.toggle("off", !ok);
  statusText.textContent = ok ? "已連線" : "離線";
}
async function startFirebase() {
  if (scoresRef) return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    scoresRef = database.ref(`rooms/${room}/rebirthScores`);
    database.ref(".info/connected").on("value", snap => setConnection(Boolean(snap.val())));
    const initial = await scoresRef.once("value");
    if (!initial.exists()) await scoresRef.set(emptyScores());
    scoresRef.on("value", snap => {
      scores = cleanScores(snap.val());
      renderPeople();
    });
  } catch (error) {
    console.error(error);
    setConnection(false);
    toastMessage("Firebase 連線失敗");
  }
}

gateForm.addEventListener("submit", event => {
  event.preventDefault();
  if (normalizePassword(passwordInput.value) === PASSWORD) unlock();
  else {
    passwordInput.value = "";
    passwordInput.focus();
    toastMessage("密碼錯誤");
  }
});
document.getElementById("copyLinkBtn").addEventListener("click", copyScoreLink);

function init() {
  room = getRoom();
  roomText.textContent = room;
  Array.from({ length: GROUP_COUNT }, (_, i) => createNode(String(i + 1)));
  renderPeople();
  if (sessionStorage.getItem(`rebirthUnlocked:${room}`) === "true") unlock();
  else passwordInput.focus();
}
init();
</script>
