-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.86),rgba(236,221,184,.36) 45%,transparent 72%);filter:blur(8px)}.smoke:before{left:2%;right:2%;bottom:16%;height:44%}.smoke:after{left:18%;right:18%;bottom:8%;height:30%;animation-delay:.15s}.person.transforming .strike{animation:strikeDown 5s ease-in-out both}.person.transforming .smoke{animation:smokeRise 5s ease-in-out both}.person.transforming .avatar{animation:bodyFlash 5s ease-in-out both}.person.final.top .final-burst:before,.person.final.top .final-burst:after{content:"";position:absolute;left:50%;top:48%;width:110%;height:110%;border-radius:50%;transform:translate(-50%,-50%);border:1px solid rgba(255,211,94,.38);animation:spinAura 8s linear infinite}.person.final.top .final-burst:after{width:82%;height:82%;animation-duration:5.5s;animation-direction:reverse}.drawer,.settlement{position:fixed;z-index:30;inset:0;pointer-events:none}.drawer-panel{position:absolute;right:24px;top:84px;width:min(390px,calc(100vw - 48px));max-height:calc(100vh - 116px);padding:22px;border:1px solid var(--line);border-radius:28px;background:rgba(255,252,244,.92);box-shadow:0 34px 90px rgba(60,45,24,.18);backdrop-filter:blur(22px);transform:translateX(calc(100% + 36px));transition:.25s;pointer-events:auto;overflow:auto}.drawer.show .drawer-panel{transform:translateX(0)}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.panel-head h2,.modal h2{margin:0;font-family:"Noto Serif TC",serif;letter-spacing:.08em}.rank-list{display:grid;gap:9px}.rank-row{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;padding:10px 12px;border:1px solid rgba(60,45,24,.1);border-radius:18px;background:rgba(255,255,255,.48);font-weight:900}.rank-row .score{font-variant-numeric:tabular-nums;color:#8b5f21}.drawer-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}.settlement{display:grid;place-items:center;background:rgba(36,27,16,.3);opacity:0;transition:.22s}.settlement.show{opacity:1;pointer-events:auto}.modal{width:min(880px,calc(100vw - 44px));max-height:calc(100vh - 60px);overflow:auto;padding:30px;border:1px solid rgba(255,255,255,.35);border-radius:34px;background:linear-gradient(180deg,rgba(255,253,246,.96),rgba(249,233,194,.92));box-shadow:0 44px 110px rgba(45,30,12,.35);text-align:center}.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:end;margin:24px 0}.winner{min-height:150px;padding:18px;border-radius:24px;border:1px solid rgba(136,92,28,.18);background:rgba(255,255,255,.52);display:grid;place-items:center;gap:6px;font-weight:900}.winner:first-child{min-height:190px;background:linear-gradient(180deg,rgba(255,237,139,.88),rgba(255,255,255,.55));order:2}.winner:nth-child(2){order:1}.winner:nth-child(3){order:3}.winner .place{font-family:"Noto Serif TC",serif;font-size:34px}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;text-align:left}.gate{position:fixed;z-index:60;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,rgba(255,255,255,.9),rgba(232,207,142,.72) 44%,rgba(118,88,45,.5));backdrop-filter:blur(10px)}.gate-card{width:min(430px,calc(100vw - 36px));padding:30px;border:1px solid rgba(85,62,31,.14);border-radius:30px;background:rgba(255,253,246,.9);box-shadow:0 34px 90px rgba(60,45,24,.24);text-align:center}.gate-card small{display:block;margin-bottom:12px;color:rgba(32,25,18,.45);font-weight:900;letter-spacing:.28em}.gate-card h2{margin:0 0 20px;font-family:"Noto Serif TC",serif;font-size:32px;letter-spacing:.08em}.gate-card input{width:100%;height:58px;margin-bottom:14px;padding:0 18px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.76);font:inherit;font-size:22px;font-weight:900;text-align:center;letter-spacing:.26em;outline:none}.gate-card input:focus{box-shadow:0 0 0 4px rgba(191,134,64,.16);border-color:rgba(191,134,64,.38)}.gate-card button,.primary{height:52px;padding:0 20px;border:1px solid rgba(168,110,40,.24);border-radius:999px;background:linear-gradient(135deg,#ffe57d,#d79e45);font-weight:900;cursor:pointer;color:#201912}.danger{background:rgba(185,74,56,.08);color:#8d3025}.hide{display:none!important}.toast{position:fixed;z-index:80;left:50%;bottom:24px;transform:translate(-50%,18px);padding:12px 18px;border-radius:999px;border:1px solid var(--line);background:rgba(255,253,246,.92);box-shadow:0 18px 48px rgba(60,45,24,.2);font-weight:900;opacity:0;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}@keyframes auraPulse{0%,100%{filter:blur(1px);transform:translate(-50%,-50%) scale(1)}50%{filter:blur(3px);transform:translate(-50%,-50%) scale(1.06)}}@keyframes strikeDown{0%,12%,100%{opacity:0}18%,32%{opacity:1}35%,70%{opacity:.38}}@keyframes smokeRise{0%,14%,100%{opacity:0;transform:translateY(16px) scale(.7)}28%,72%{opacity:.92;transform:translateY(-16px) scale(1.2)}86%{opacity:.2;transform:translateY(-38px) scale(1.55)}}@keyframes bodyFlash{0%,100%{opacity:1;filter:drop-shadow(0 26px 22px rgba(30,24,17,.22))}20%,58%{opacity:.2;filter:drop-shadow(0 0 30px rgba(255,232,132,.9)) brightness(1.8)}}@keyframes spinAura{to{transform:translate(-50%,-50%) rotate(360deg)}}@media(max-width:980px){.brand{transform:none}.stage{top:116px}.controls{opacity:.88}.person{width:126px;height:190px}.label{font-size:12px;min-width:66px}.podium{grid-template-columns:1fr}}

<body>
<div class="app" id="app">
  <div class="moon"></div><div class="ink-mountain"></div>
  <header class="topbar">

</div>

<script>
const firebaseConfig={apiKey:"AIzaSyD5ytWrUOI6UIUBIcKpF3fyODQR2pXFMmY",authDomain:"score-calculation-ef584.firebaseapp.com",databaseURL:"https://score-calculation-ef584-default-rtdb.firebaseio.com",projectId:"score-calculation-ef584",storageBucket:"score-calculation-ef584.firebasestorage.app",messagingSenderId:"634074718336",appId:"1:634074718336:web:38960860ad796197a50665",measurementId:"G-R6NT2QJQSC"};
const PASSWORD="184179";
const GROUP_COUNT=11;
const CN=["一","二","三","四","五","六","七","八","九","十","十一"];
const STAGES=[
  {threshold:0,name:"初生",image:"assets/rebirth-stage-1.png"},
  {threshold:221,name:"覺醒",image:"assets/rebirth-stage-2.png"},
  {threshold:441,name:"修心",image:"assets/rebirth-stage-3.png"},
  {threshold:661,name:"執劍",image:"assets/rebirth-stage-4.png"},
  {threshold:881,name:"立德",image:"assets/rebirth-stage-5.png"},
  {threshold:1101,name:"立功",image:"assets/rebirth-stage-6.png"},
  {threshold:1321,name:"立言",image:"assets/rebirth-stage-7.png"},
  {threshold:1541,name:"古神",image:"assets/rebirth-stage-8.png"}
];
const POS=[{x:8,y:42,s:.92},{x:20,y:25,s:.86},{x:35,y:33,s:.98},{x:50,y:22,s:.9},{x:65,y:34,s:.95},{x:82,y:26,s:.9},{x:18,y:63,s:.96},{x:34,y:58,s:.9},{x:50,y:65,s:1.02},{x:66,y:58,s:.92},{x:82,y:62,s:.98}];
const field=document.getElementById("field");
const gate=document.getElementById("gate");
const gateForm=document.getElementById("gateForm");
const passwordInput=document.getElementById("passwordInput");
const statusDot=document.getElementById("statusDot");
const statusText=document.getElementById("statusText");
const roomText=document.getElementById("roomText");
const drawer=document.getElementById("drawer");
const rankList=document.getElementById("rankList");
const settlement=document.getElementById("settlement");
const podium=document.getElementById("podium");
const resultGrid=document.getElementById("resultGrid");
const toast=document.getElementById("toast");
let room="";
let scores=emptyScores();
let database=null;
let scoresRef=null;
let hydrated=false;
const nodes=new Map();
const stageByGroup=new Map();
const timers=new Map();
const processedImages=new Map();
function emptyScores(){return Object.fromEntries(Array.from({length:GROUP_COUNT},(_,i)=>[String(i+1),0]))}
function groupName(id){return `第${CN[Number(id)-1]}組`}
function normalizePassword(value){return String(value||"").replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-65248)).trim()}
function toastMessage(message){toast.textContent=message;toast.classList.add("show");clearTimeout(toastMessage.timer);toastMessage.timer=setTimeout(()=>toast.classList.remove("show"),1800)}
function getRoom(){const url=new URL(location.href);let next=url.searchParams.get("room");if(!next){next=`rebirth_${Math.random().toString(36).slice(2,8)}`;url.searchParams.set("room",next);history.replaceState(null,"",url)}return next}
function getStage(score){let found=STAGES[0],index=0;STAGES.forEach((stage,i)=>{if(score>=stage.threshold){found=stage;index=i}});return {...found,index}}
function rankData(){return Array.from({length:GROUP_COUNT},(_,i)=>{const id=String(i+1);return{id,name:groupName(id),score:Number(scores[id])||0,stage:getStage(Number(scores[id])||0)}}).sort((a,b)=>b.score-a.score||Number(a.id)-Number(b.id))}
function cleanScores(raw){const next=emptyScores();if(raw&&typeof raw==="object"){Object.keys(next).forEach(key=>next[key]=Math.max(0,Number(raw[key])||0))}return next}
function powerFor(item,rankIndex){const scorePower=Math.min(item.score/1541,1);const rankPower=1-rankIndex/(GROUP_COUNT-1||1)*.28;return Math.max(.12,Math.min(1,scorePower*.72+rankPower*.28))}
function auraFor(item,rankIndex){if(item.score<=0)return .48;return .74+powerFor(item,rankIndex)*1.26+(item.stage.index===STAGES.length-1?.38:0)}
function transparentAsset(source){if(processedImages.has(source))return processedImages.get(source);const promise=new Promise(resolve=>{const image=new Image();image.onload=()=>{try{const canvas=document.createElement("canvas");canvas.width=image.naturalWidth;canvas.height=image.naturalHeight;const context=canvas.getContext("2d",{willReadFrequently:true});context.drawImage(image,0,0);const pixels=context.getImageData(0,0,canvas.width,canvas.height);const data=pixels.data;for(let i=0;i<data.length;i+=4){const r=data[i],g=data[i+1],b=data[i+2];const max=Math.max(r,g,b),min=Math.min(r,g,b);const sat=max-min;const white=max>=224&&sat<=26;const checker=r>=228&&g>=228&&b>=228&&sat<=34;if(white||checker)data[i+3]=0}context.putImageData(pixels,0,0);resolve(canvas.toDataURL("image/png"))}catch(error){console.warn("image processing fallback",error);resolve(source)}};image.onerror=()=>resolve(source);image.src=source});processedImages.set(source,promise);return promise}
async function setImage(img,source){img.dataset.target=source;const src=await transparentAsset(source);if(img.dataset.target===source)img.src=src}
function createNode(id){const pos=POS[Number(id)-1];const el=document.createElement("article");el.className="person";el.style.setProperty("--x",`${pos.x}%`);el.style.setProperty("--y",`${pos.y}%`);el.style.setProperty("--scale",pos.s);el.style.setProperty("--aura",.5);el.style.setProperty("--power",.2);el.innerHTML=`<div class="aura"></div><div class="final-burst"></div><div class="strike"></div><div class="smoke"></div><div class="avatar-wrap"><img class="avatar" alt="${groupName(id)}"></div><div class="label">${groupName(id)}</div><div class="stage-name"></div>`;field.appendChild(el);const img=el.querySelector("img");nodes.set(id,{el,img,stageName:el.querySelector(".stage-name")});return nodes.get(id)}
function renderPeople(){const ranking=rankData();const order=new Map(ranking.map((item,index)=>[item.id,index]));for(let i=1;i<=GROUP_COUNT;i++){const id=String(i);const score=Number(scores[id])||0;const item=ranking.find(row=>row.id===id);const rankIndex=order.get(id)??GROUP_COUNT-1;const node=nodes.get(id)||createNode(id);const stage=getStage(score);const oldIndex=stageByGroup.has(id)?stageByGroup.get(id):stage.index;node.el.classList.toggle("top",rankIndex===0&&score>0);node.el.classList.toggle("final",stage.index===STAGES.length-1);node.el.style.setProperty("--aura",auraFor(item,rankIndex).toFixed(2));node.el.style.setProperty("--power",powerFor(item,rankIndex).toFixed(2));node.stageName.textContent=stage.name;if(!hydrated||stage.index<=oldIndex){clearTransform(id);stageByGroup.set(id,stage.index);setImage(node.img,stage.image);continue}playTransform(id,node,stage)}hydrated=true;renderRanks()}
function clearTransform(id){const timer=timers.get(id);if(timer){timer.forEach(clearTimeout);timers.delete(id)}const node=nodes.get(id);if(node)node.el.classList.remove("transforming")}
function playTransform(id,node,stage){clearTransform(id);node.el.classList.add("transforming");const reveal=setTimeout(()=>{setImage(node.img,stage.image);stageByGroup.set(id,stage.index)},2800);const end=setTimeout(()=>{node.el.classList.remove("transforming");timers.delete(id)},5200);timers.set(id,[reveal,end])}
function renderRanks(){const rows=rankData();rankList.innerHTML=rows.map((row,index)=>`<div class="rank-row"><span>#${index+1}</span><span>${row.name}<small> · ${row.stage.name}</small></span><span class="score">${row.score}</span></div>`).join("")}
function renderSettlement(){const rows=rankData();podium.innerHTML=rows.slice(0,3).map((row,index)=>`<div class="winner"><div class="place">${index+1}</div><div>${row.name}</div><div>${row.stage.name}</div><strong>${row.score}</strong></div>`).join("");resultGrid.innerHTML=rows.map((row,index)=>`<div class="rank-row"><span>#${index+1}</span><span>${row.name}</span><span class="score">${row.score}</span></div>`).join("")}
function scoreLink(){const url=new URL(location.href);url.pathname=url.pathname.replace(/rebirth_rank\.html$/,"rebirth_score_input.html");url.searchParams.set("room",room);return url.toString()}
async function copyScoreLink(){const link=scoreLink();try{await navigator.clipboard.writeText(link);toastMessage("已複製加分連結")}catch{prompt("加分連結",link)}}
function unlock(){sessionStorage.setItem(`rebirthUnlocked:${room}`,"true");gate.classList.add("hide");startFirebase()}
gateForm.addEventListener("submit",event=>{event.preventDefault();if(normalizePassword(passwordInput.value)===PASSWORD)unlock();else{passwordInput.value="";passwordInput.focus();toastMessage("密碼錯誤")}});
document.getElementById("rankBtn").addEventListener("click",()=>{drawer.classList.add("show");document.getElementById("controls").classList.add("open")});
document.getElementById("closeDrawer").addEventListener("click",()=>{drawer.classList.remove("show");document.getElementById("controls").classList.remove("open")});
document.getElementById("settleBtn").addEventListener("click",()=>{renderSettlement();settlement.classList.add("show")});
document.getElementById("drawerSettle").addEventListener("click",()=>{renderSettlement();settlement.classList.add("show")});
document.getElementById("closeSettlement").addEventListener("click",()=>settlement.classList.remove("show"));
settlement.addEventListener("click",event=>{if(event.target===settlement)settlement.classList.remove("show")});
document.getElementById("copyLinkBtn").addEventListener("click",copyScoreLink);
document.getElementById("resetBtn").addEventListener("click",async()=>{if(!scoresRef)return;if(confirm("確定重置轉生榜？")){await scoresRef.set(emptyScores());toastMessage("已重置")}});
function setConnection(ok){statusDot.classList.toggle("off",!ok);statusText.textContent=ok?"已連線":"離線"}
async function startFirebase(){if(scoresRef)return;try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);database=firebase.database();scoresRef=database.ref(`rooms/${room}/rebirthScores`);database.ref(".info/connected").on("value",snap=>setConnection(Boolean(snap.val())));const initial=await scoresRef.once("value");if(!initial.exists())await scoresRef.set(emptyScores());scoresRef.on("value",snap=>{scores=cleanScores(snap.val());renderPeople()})}catch(error){console.error(error);setConnection(false);toastMessage("Firebase 連線失敗")}}
function init(){room=getRoom();roomText.textContent=room;Array.from({length:GROUP_COUNT},(_,i)=>createNode(String(i+1)));renderPeople();if(sessionStorage.getItem(`rebirthUnlocked:${room}`)==="true")unlock();else passwordInput.focus()}
init();
</script>
</body>
</html>
