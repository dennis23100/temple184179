<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#fff7e6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="每日星星">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" type="image/png" href="assets/icon-192.png">
<title>每日星星．精神小語</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap");

:root {
  --ink: #201912;
  --paper: #fffaf0;
  --cream: #fff7e6;
  --gold: #f4d778;
  --amber: #bf8640;
  --red: #b94a38;
  --line: rgba(54, 41, 24, .15);
  --shadow: rgba(60, 45, 24, .18);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; width: 100%; min-height: 100%; }
body {
  color: var(--ink);
  font-family: "Zen Maru Gothic", "Noto Serif TC", "Microsoft JhengHei", sans-serif;
  background:
    radial-gradient(circle at 20% 8%, rgba(244, 215, 120, .25), transparent 42%),
    radial-gradient(circle at 85% 30%, rgba(255, 255, 255, .65), transparent 40%),
    var(--cream);
  overscroll-behavior-y: none;
}
button, input, textarea { font: inherit; color: inherit; }

.app {
  max-width: 520px;
  margin: 0 auto;
  padding: calc(14px + var(--safe-top)) 16px calc(86px + var(--safe-bottom));
  min-height: 100vh;
}

/* ---------- header ---------- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
}
.brand h1 {
  margin: 0;
  font-family: "Noto Serif TC", serif;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: .04em;
}
.brand small {
  display: block;
  margin-top: 2px;
  color: rgba(32, 25, 18, .5);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
}
.user-chip {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 253, 245, .8);
  padding: 7px 13px;
  font-size: 13px;
  font-weight: 900;
  box-shadow: 0 8px 20px rgba(80, 56, 24, .08);
  cursor: pointer;
  white-space: nowrap;
  max-width: 44vw;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ---------- cards ---------- */
.card {
  position: relative;
  border: 1px solid rgba(60, 45, 24, .1);
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255, 255, 250, .92), rgba(255, 249, 236, .9));
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .55), 0 18px 48px rgba(60, 45, 24, .1);
  padding: 20px;
  margin-bottom: 16px;
}
.card h2 {
  margin: 0 0 10px;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: .2em;
  color: rgba(32, 25, 18, .48);
}
.quote-text {
  margin: 4px 0 2px;
  font-family: "Noto Serif TC", serif;
  font-size: 21px;
  line-height: 1.65;
  font-weight: 900;
}
.date-line {
  margin-top: 12px;
  color: rgba(32, 25, 18, .45);
  font-size: 12px;
  font-weight: 700;
}
textarea.mood {
  width: 100%;
  min-height: 128px;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(255, 255, 255, .82);
  resize: vertical;
  outline: none;
  font-size: 16px;
  line-height: 1.6;
}
textarea.mood:focus {
  border-color: rgba(191, 134, 64, .4);
  box-shadow: 0 0 0 4px rgba(191, 134, 64, .14);
}
.primary {
  display: block;
  width: 100%;
  height: 54px;
  margin-top: 14px;
  border: 1px solid rgba(168, 110, 40, .24);
  border-radius: 999px;
  background: linear-gradient(135deg, #ffe57d, #d79e45);
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 14px 30px rgba(191, 134, 64, .28);
  transition: transform .12s;
}
.primary:active { transform: scale(.97); }
.primary[disabled] { opacity: .55; box-shadow: none; cursor: default; }
.mine-text {
  padding: 13px 16px;
  border-radius: 18px;
  border: 1px dashed rgba(191, 134, 64, .35);
  background: rgba(255, 244, 214, .55);
  font-size: 15.5px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.draw-cta {
  background: linear-gradient(135deg, #ffd97d, #f0a03c);
  animation: breathe 2.2s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.025); }
}

/* ---------- 本週列（像 Pikmin Bloom） ---------- */
.week-card { padding: 14px 12px 12px; }
.week-head, .week-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
}
.week-head span {
  font-size: 12px;
  font-weight: 900;
  color: rgba(32, 25, 18, .45);
  padding-bottom: 8px;
}
.wday {
  position: relative;
  border: none;
  background: none;
  padding: 2px 0 6px;
  cursor: pointer;
  display: grid;
  place-items: center;
  min-height: 46px;
}
.wday .num {
  font-size: 17px;
  font-weight: 900;
  color: #9db7d8;
}
.wday.past .num { color: rgba(32, 25, 18, .3); }
.wday img {
  width: 34px;
  height: 34px;
  object-fit: contain;
  filter: drop-shadow(0 3px 4px rgba(30, 24, 17, .18));
}
.wday .dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffe57d, #d79e45);
  box-shadow: 0 2px 6px rgba(191, 134, 64, .4);
}
.wday.today::after {
  content: "";
  position: absolute;
  left: 22%;
  right: 22%;
  bottom: 0;
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(90deg, #ffcf5e, #d79e45);
}

/* today's star result */
.today-star {
  display: flex;
  align-items: center;
  gap: 16px;
}
.today-star img {
  width: 116px;
  height: 116px;
  object-fit: contain;
  filter: drop-shadow(0 10px 12px rgba(30, 24, 17, .18));
  animation: floaty 3.2s ease-in-out infinite;
}
@keyframes floaty {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-7px) rotate(2deg); }
}
.today-star .star-name {
  font-family: "Noto Serif TC", serif;
  font-size: 22px;
  font-weight: 900;
}
.today-star .star-sub {
  margin-top: 4px;
  color: rgba(32, 25, 18, .5);
  font-size: 12.5px;
  font-weight: 700;
}
.countdown {
  margin-top: 14px;
  text-align: center;
  color: rgba(32, 25, 18, .5);
  font-size: 12.5px;
  font-weight: 900;
}

/* ---------- 星星草原 ---------- */
.scene-card { padding: 12px; }
.scene {
  position: relative;
  height: 54vh;
  min-height: 330px;
  border-radius: 18px;
  overflow: hidden;
  background:
    radial-gradient(circle at 78% 12%, rgba(255, 245, 190, .9), transparent 26%),
    linear-gradient(180deg, #dff2fd 0%, #eafbe4 34%, #cdecb2 36%, #b6e296 100%);
}
.scene .deco {
  position: absolute;
  font-size: 13px;
  opacity: .85;
  pointer-events: none;
}
.critter {
  position: absolute;
  width: 58px;
  height: 58px;
  margin: -29px 0 0 -29px;
  border: none;
  background: none;
  padding: 0;
  cursor: pointer;
  transition: left 2.6s ease-in-out, top 2.6s ease-in-out;
  z-index: 2;
}
.critter img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 6px 5px rgba(40, 60, 20, .25));
  transform: scaleX(var(--sx, 1));
  animation: hop var(--hop, 1.3s) ease-in-out infinite;
}
@keyframes hop {
  0%, 100% { transform: scaleX(var(--sx, 1)) translateY(0); }
  50% { transform: scaleX(var(--sx, 1)) translateY(-8px); }
}
.critter .tag {
  position: absolute;
  left: 50%;
  top: -18px;
  transform: translateX(-50%);
  padding: 2px 9px;
  border-radius: 999px;
  background: rgba(255, 253, 245, .95);
  border: 1px solid var(--line);
  font-size: 11px;
  font-weight: 900;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
}
.critter.show-tag .tag { opacity: 1; }
.scene-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding: 0 6px;
}
.scene-bar .count {
  font-size: 13px;
  font-weight: 900;
  color: rgba(32, 25, 18, .55);
}
.dex-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 42px;
  padding: 0 16px;
  border: 1px solid rgba(168, 110, 40, .24);
  border-radius: 999px;
  background: linear-gradient(135deg, #ffe57d, #d79e45);
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 10px 22px rgba(191, 134, 64, .3);
}
.scene-empty {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  text-align: center;
  color: rgba(50, 70, 40, .55);
  font-weight: 900;
  font-size: 14px;
  line-height: 1.8;
  z-index: 1;
}

/* ---------- 圖鑑 ---------- */
.dex-overlay {
  position: fixed;
  z-index: 75;
  inset: 0;
  overflow-y: auto;
  background: rgba(255, 247, 230, .97);
  backdrop-filter: blur(8px);
  padding: calc(16px + var(--safe-top)) 16px calc(30px + var(--safe-bottom));
}
.dex-inner { max-width: 520px; margin: 0 auto; }
.dex-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.dex-head h3 {
  margin: 0;
  font-family: "Noto Serif TC", serif;
  font-size: 24px;
  font-weight: 900;
}
.dex-head .close-btn {
  width: 42px;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 50%;
  background: rgba(255, 253, 245, .9);
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
}
.dex-count {
  margin: 0 0 14px;
  font-size: 13px;
  font-weight: 900;
  color: rgba(32, 25, 18, .5);
}
.star-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.star-cell {
  border: 1px solid rgba(60, 45, 24, .1);
  border-radius: 16px;
  background: rgba(255, 253, 245, .85);
  padding: 8px 6px 7px;
  text-align: center;
  box-shadow: 0 8px 18px rgba(60, 45, 24, .06);
}
.star-cell img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: contain;
}
.star-cell.unknown img { opacity: .88; }
.star-cell .n {
  font-size: 11.5px;
  font-weight: 900;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.star-cell.unknown .n { color: rgba(32, 25, 18, .35); letter-spacing: .18em; }
.empty-hint {
  padding: 34px 10px;
  text-align: center;
  color: rgba(32, 25, 18, .45);
  font-weight: 700;
  font-size: 14px;
  line-height: 1.8;
}

/* ---------- 月曆 ---------- */
.cal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.cal-head .title {
  font-family: "Noto Serif TC", serif;
  font-size: 21px;
  font-weight: 900;
}
.cal-nav {
  width: 40px;
  height: 40px;
  border: 1px solid var(--line);
  border-radius: 50%;
  background: rgba(255, 253, 245, .85);
  font-weight: 900;
  cursor: pointer;
}
.cal-week, .cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
}
.cal-week span {
  font-size: 12px;
  font-weight: 900;
  color: rgba(32, 25, 18, .45);
  padding-bottom: 8px;
}
.cal-grid { row-gap: 4px; }
.cal-cell {
  position: relative;
  border: none;
  background: none;
  padding: 3px 0;
  min-height: 56px;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 2px;
  cursor: pointer;
  border-radius: 14px;
}
.cal-cell:disabled { cursor: default; }
.cal-cell .num {
  font-size: 13px;
  font-weight: 900;
  color: rgba(32, 25, 18, .55);
}
.cal-cell.future .num { color: rgba(157, 183, 216, .9); }
.cal-cell img {
  width: 30px;
  height: 30px;
  object-fit: contain;
  filter: drop-shadow(0 3px 3px rgba(30, 24, 17, .16));
}
.cal-cell .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffe57d, #d79e45);
}
.cal-cell.today { background: rgba(255, 229, 125, .28); }

/* ---------- 單日詳細 modal ---------- */
.day-modal {
  position: fixed;
  z-index: 80;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 22px;
  background: rgba(60, 45, 24, .35);
  backdrop-filter: blur(6px);
}
.day-modal .sheet {
  width: min(420px, 100%);
  max-height: 84vh;
  overflow-y: auto;
  border: 1px solid rgba(85, 62, 31, .14);
  border-radius: 26px;
  background: rgba(255, 253, 246, .98);
  box-shadow: 0 34px 90px rgba(60, 45, 24, .35);
  padding: 22px;
}
.day-modal .m-date {
  font-size: 13px;
  font-weight: 900;
  color: rgba(32, 25, 18, .5);
}
.day-modal .m-quote {
  margin: 8px 0 12px;
  font-family: "Noto Serif TC", serif;
  font-size: 18px;
  line-height: 1.6;
  font-weight: 900;
}
.day-modal .m-label {
  margin: 14px 0 6px;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .2em;
  color: rgba(32, 25, 18, .45);
}
.day-modal .m-star {
  display: flex;
  align-items: center;
  gap: 14px;
}
.day-modal .m-star img {
  width: 92px;
  height: 92px;
  object-fit: contain;
  filter: drop-shadow(0 8px 10px rgba(30, 24, 17, .18));
}
.day-modal .m-star .n {
  font-family: "Noto Serif TC", serif;
  font-size: 20px;
  font-weight: 900;
}
.day-modal .close-row {
  margin-top: 18px;
  text-align: center;
}
.day-modal .close-row button {
  height: 46px;
  padding: 0 30px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 253, 245, .9);
  font-weight: 900;
  cursor: pointer;
}

/* ---------- tabs ---------- */
.tabbar {
  position: fixed;
  z-index: 30;
  left: 50%;
  bottom: calc(12px + var(--safe-bottom));
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  padding: 5px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 253, 245, .9);
  backdrop-filter: blur(14px);
  box-shadow: 0 18px 44px rgba(60, 45, 24, .18);
}
.tabbar button {
  min-width: 92px;
  height: 44px;
  border: none;
  border-radius: 999px;
  background: transparent;
  font-size: 14px;
  font-weight: 900;
  color: rgba(32, 25, 18, .55);
  cursor: pointer;
}
.tabbar button.active {
  background: linear-gradient(135deg, #ffe57d, #e0a94f);
  color: var(--ink);
  box-shadow: 0 8px 18px rgba(191, 134, 64, .3);
}
.view { display: none; }
.view.active { display: block; animation: fadeUp .3s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- gate (name) ---------- */
.gate {
  position: fixed;
  z-index: 60;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 20px;
  background: radial-gradient(circle at 50% 28%, rgba(255, 255, 255, .92), rgba(244, 215, 120, .55) 52%, rgba(191, 134, 64, .4));
  backdrop-filter: blur(10px);
}
.gate-card {
  width: min(400px, 100%);
  padding: 30px 26px;
  border: 1px solid rgba(85, 62, 31, .14);
  border-radius: 30px;
  background: rgba(255, 253, 246, .94);
  box-shadow: 0 34px 90px rgba(60, 45, 24, .26);
  text-align: center;
}
.gate-card small {
  display: block;
  margin-bottom: 10px;
  color: rgba(32, 25, 18, .45);
  font-weight: 900;
  letter-spacing: .3em;
}
.gate-card h2 {
  margin: 0 0 18px;
  font-family: "Noto Serif TC", serif;
  font-size: 26px;
  letter-spacing: .06em;
}
.gate-card input {
  width: 100%;
  height: 56px;
  margin-bottom: 14px;
  padding: 0 18px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, .8);
  font-size: 19px;
  font-weight: 900;
  text-align: center;
  outline: none;
}
.gate-card input:focus {
  border-color: rgba(191, 134, 64, .4);
  box-shadow: 0 0 0 4px rgba(191, 134, 64, .15);
}
.gate-card .primary { margin-top: 4px; }

/* ---------- draw overlay ---------- */
.draw-overlay {
  position: fixed;
  z-index: 70;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 20px;
  background: radial-gradient(circle at 50% 34%, rgba(255, 250, 232, .97), rgba(240, 213, 140, .94));
  backdrop-filter: blur(8px);
}
.draw-box {
  width: min(400px, 100%);
  text-align: center;
}
.draw-box h3 {
  margin: 0 0 6px;
  font-family: "Noto Serif TC", serif;
  font-size: 26px;
  font-weight: 900;
}
.draw-box .sub {
  margin: 0 0 22px;
  color: rgba(32, 25, 18, .55);
  font-size: 13.5px;
  font-weight: 700;
}
.capsule {
  width: 190px;
  height: 190px;
  margin: 0 auto 24px;
  display: grid;
  place-items: center;
  font-size: 120px;
  line-height: 1;
  filter: drop-shadow(0 20px 22px rgba(140, 96, 30, .35));
  user-select: none;
}
.capsule.shake { animation: shake .5s ease-in-out infinite; }
@keyframes shake {
  0%, 100% { transform: rotate(0) translateX(0); }
  20% { transform: rotate(-14deg) translateX(-8px); }
  40% { transform: rotate(10deg) translateX(7px) scale(1.05); }
  60% { transform: rotate(-9deg) translateX(-6px) scale(1.08); }
  80% { transform: rotate(12deg) translateX(6px) scale(1.03); }
}
.reveal-star {
  width: min(240px, 62vw);
  height: min(240px, 62vw);
  margin: 0 auto 8px;
  object-fit: contain;
  filter: drop-shadow(0 18px 20px rgba(30, 24, 17, .22));
}
/* 登場動畫（每次隨機一種） */
@keyframes popIn {
  from { opacity: 0; transform: scale(.2) rotate(-30deg); }
  to { opacity: 1; transform: scale(1) rotate(0); }
}
@keyframes dropBounce {
  0% { opacity: 0; transform: translateY(-70vh) scale(.8); }
  55% { opacity: 1; transform: translateY(0) scale(1.05, .82); }
  70% { transform: translateY(-34px) scale(.95, 1.08); }
  85% { transform: translateY(0) scale(1.03, .94); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes spinIn {
  from { opacity: 0; transform: scale(.1) rotate(720deg); }
  70% { opacity: 1; transform: scale(1.15) rotate(-14deg); }
  to { opacity: 1; transform: scale(1) rotate(0); }
}
@keyframes flipIn {
  from { opacity: 0; transform: perspective(500px) rotateY(540deg) scale(.4); }
  to { opacity: 1; transform: perspective(500px) rotateY(0) scale(1); }
}
@keyframes zoomWobble {
  0% { opacity: 0; transform: scale(3); filter: blur(6px) drop-shadow(0 18px 20px rgba(30,24,17,.22)); }
  45% { opacity: 1; transform: scale(.88) rotate(-7deg); filter: blur(0); }
  65% { transform: scale(1.08) rotate(6deg); }
  82% { transform: scale(.97) rotate(-3deg); }
  100% { opacity: 1; transform: scale(1) rotate(0); }
}
@keyframes slideSquash {
  0% { opacity: 0; transform: translateY(46vh) scale(1.2, .6); }
  60% { opacity: 1; transform: translateY(-22px) scale(.9, 1.12); }
  80% { transform: translateY(0) scale(1.06, .92); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
/* 待機動畫（登場後接著隨機一種） */
@keyframes wiggle {
  0%, 100% { transform: rotate(-7deg); }
  50% { transform: rotate(7deg); }
}
@keyframes spinSlow {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  12% { transform: scale(1.12); }
  24% { transform: scale(.98); }

/* ================= 星星偵測引擎 =================
   沿用 rebirth_rank.html 的去背原理：接近白/米色的像素視為紙的底色。
   在整張圖上做連通區塊分析，自動找出每一顆星星的位置，
   所以換上任何一張「米色底＋星星」的圖片都能直接用。 */
const sheetImages = new Map();   // index -> HTMLImageElement
const sheetBoxes = new Map();    // index -> [{x,y,w,h} 相對座標]
const starUrlCache = new Map();  // cacheKey -> dataURL

const EXCLUDE_ZONES = {
  1: [{ x: 0, y: 0, w: 0.62, h: 0.14 }]
};

function isPale(r, g, b) {
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  return max >= 224 && max - min <= 34;
}
function loadSheet(index) {
  if (sheetImages.has(index)) return Promise.resolve(sheetImages.get(index));
  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => { sheetImages.set(index, image); resolve(image); };
    image.onerror = () => reject(new Error("找不到星星圖片：" + SHEETS[index]));
    image.src = SHEETS[index];
  });
}
function detectBoxes(image, sheetIndex) {
  const scale = Math.min(1, 900 / image.naturalWidth);
  const w = Math.max(1, Math.round(image.naturalWidth * scale));
  const h = Math.max(1, Math.round(image.naturalHeight * scale));
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  const context = canvas.getContext("2d", { willReadFrequently: true });
  context.drawImage(image, 0, 0, w, h);
  const data = context.getImageData(0, 0, w, h).data;

  const mask = new Uint8Array(w * h);
  for (let i = 0, p = 0; i < data.length; i += 4, p++) {
    if (data[i + 3] > 40 && !isPale(data[i], data[i + 1], data[i + 2])) mask[p] = 1;
  }

  // 連通區塊（8 方向）
  const label = new Int32Array(w * h).fill(-1);
  const comps = [];
  const stack = [];
  for (let start = 0; start < w * h; start++) {
    if (!mask[start] || label[start] >= 0) continue;
    const id = comps.length;
    const c = { minX: w, minY: h, maxX: 0, maxY: 0, count: 0 };
    stack.length = 0;
    stack.push(start);
    label[start] = id;
    while (stack.length) {
      const p = stack.pop();
      const x = p % w, y = (p / w) | 0;
      c.count++;
      if (x < c.minX) c.minX = x;
      if (x > c.maxX) c.maxX = x;
      if (y < c.minY) c.minY = y;
      if (y > c.maxY) c.maxY = y;
      for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
        const np = ny * w + nx;
        if (mask[np] && label[np] < 0) { label[np] = id; stack.push(np); }
      }
    }
    comps.push(c);
  }

  // 合併互相重疊 / 包含的區塊（例如空心星星裡的眼睛）
  let boxes = comps.filter(c => c.count > 24);
  let changed = true;
  while (changed) {
    changed = false;
    outer:
    for (let i = 0; i < boxes.length; i++) {
      for (let j = i + 1; j < boxes.length; j++) {
        const a = boxes[i], b = boxes[j];
        const ox = Math.min(a.maxX, b.maxX) - Math.max(a.minX, b.minX);
        const oy = Math.min(a.maxY, b.maxY) - Math.max(a.minY, b.minY);
        if (ox <= 0 || oy <= 0) continue;
        const overlap = ox * oy;
        const areaA = (a.maxX - a.minX) * (a.maxY - a.minY);
        const areaB = (b.maxX - b.minX) * (b.maxY - b.minY);
        if (overlap >= 0.6 * Math.min(areaA, areaB)) {
          a.minX = Math.min(a.minX, b.minX);
          a.minY = Math.min(a.minY, b.minY);
          a.maxX = Math.max(a.maxX, b.maxX);
          a.maxY = Math.max(a.maxY, b.maxY);
          a.count += b.count;
          boxes.splice(j, 1);
          changed = true;
          break outer;
        }
      }
    }
  }

  // 過濾：太小的（手寫字）、太扁太長的（簽名）、貼到邊緣被切掉的
  const minSize = w * 0.075;
  const result = [];
  for (const b of boxes) {
    const bw = b.maxX - b.minX, bh = b.maxY - b.minY;
    if (bw < minSize || bh < minSize) continue;
    const aspect = bw / bh;
    if (aspect < 0.45 || aspect > 2.2) continue;
    if (b.minX <= 2 || b.minY <= 2 || b.maxX >= w - 3 || b.maxY >= h - 3) continue;
    const cx = (b.minX + b.maxX) / 2 / w, cy = (b.minY + b.maxY) / 2 / h;
    const excluded = (EXCLUDE_ZONES[sheetIndex] || []).some(z =>
      cx >= z.x && cx <= z.x + z.w && cy >= z.y && cy <= z.y + z.h);
    if (excluded) continue;
    result.push({ x: b.minX / w, y: b.minY / h, w: bw / w, h: bh / h });
  }
  // 固定順序：由上到下、由左到右，圖鑑的編號才會穩定
  result.sort((a, b) => (a.y - b.y) || (a.x - b.x));
  return result;
}
async function boxesFor(index) {
  if (sheetBoxes.has(index)) return sheetBoxes.get(index);
  const image = await loadSheet(index);
  const cacheKey = `temple:boxes:v3:${SHEETS[index]}:${image.naturalWidth}x${image.naturalHeight}`;
  let boxes = null;
  try { boxes = JSON.parse(localStorage.getItem(cacheKey) || "null"); } catch {}
  if (!Array.isArray(boxes) || !boxes.length) {
    boxes = detectBoxes(image, index);
    try { localStorage.setItem(cacheKey, JSON.stringify(boxes)); } catch {}
  }
  sheetBoxes.set(index, boxes);
  return boxes;
}
async function renderStarCanvas(star) {
  const image = await loadSheet(star.sheet);
  const W = image.naturalWidth, H = image.naturalHeight;
  const pad = Math.max(star.w * W, star.h * H) * 0.08;

  const sy = Math.max(0, star.y * H - pad);
  const sw = Math.min(W - sx, star.w * W + pad * 2);
  const sh = Math.min(H - sy, star.h * H + pad * 2);
  const scale = Math.min(1.6, 460 / Math.max(sw, sh));
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(sw * scale));
  canvas.height = Math.max(1, Math.round(sh * scale));
  const context = canvas.getContext("2d", { willReadFrequently: true });
  context.imageSmoothingQuality = "high";
  context.drawImage(image, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
  return { canvas, context };
}
/* 把裁下來的方框清乾淨：只留星星本體，
   旁邊的手寫字、隔壁星星伸進來的角都拿掉 */
function cleanupCrop(pixels, w, h) {
  const data = pixels.data;
  const solid = new Uint8Array(w * h);
  for (let p = 0; p < w * h; p++) solid[p] = data[p * 4 + 3] > 40 ? 1 : 0;
  const label = new Int32Array(w * h).fill(-1);
  const comps = [];
  const stack = [];
  for (let start = 0; start < w * h; start++) {
    if (!solid[start] || label[start] >= 0) continue;
    const id = comps.length;
    const c = { minX: w, minY: h, maxX: 0, maxY: 0, count: 0 };
    stack.length = 0;
    stack.push(start);
    label[start] = id;
    while (stack.length) {
      const p = stack.pop();
      const x = p % w, y = (p / w) | 0;
      c.count++;
      if (x < c.minX) c.minX = x;
      if (x > c.maxX) c.maxX = x;
      if (y < c.minY) c.minY = y;
      if (y > c.maxY) c.maxY = y;
      for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
        const np = ny * w + nx;
        if (solid[np] && label[np] < 0) { label[np] = id; stack.push(np); }
      }
    }
    comps.push(c);
  }
  // 保留：夠大的區塊，或有碰到畫面正中央的區塊（星星身體、空心星星裡的眼睛）
  const cx0 = w * .38, cx1 = w * .62, cy0 = h * .38, cy1 = h * .62;
  const total = w * h;
  const keep = comps.map(c =>
    c.count >= total * .06 ||
    (c.maxX >= cx0 && c.minX <= cx1 && c.maxY >= cy0 && c.minY <= cy1));
  for (let p = 0; p < w * h; p++) {
    if (solid[p] && !keep[label[p]]) data[p * 4 + 3] = 0;
  }
}
async function starImageUrl(star, variant = "color") {
  const cacheKey = `${variant}:${star.sheet}:${star.x.toFixed(4)}:${star.y.toFixed(4)}:${star.w.toFixed(4)}:${star.h.toFixed(4)}`;
  if (starUrlCache.has(cacheKey)) return starUrlCache.get(cacheKey);
  const { canvas, context } = await renderStarCanvas(star);
  const pixels = context.getImageData(0, 0, canvas.width, canvas.height);
  const data = pixels.data;
  for (let i = 0; i < data.length; i += 4) {
    if (isPale(data[i], data[i + 1], data[i + 2])) data[i + 3] = 0;
  }
  cleanupCrop(pixels, canvas.width, canvas.height);
  if (variant === "shadow") {
    for (let i = 0; i < data.length; i += 4) {
      if (data[i + 3] > 0) { data[i] = 46; data[i + 1] = 42; data[i + 2] = 38; } // 未擁有 → 全黑剪影
    }
  }
  context.putImageData(pixels, 0, 0);
  const url = canvas.toDataURL("image/png");
  starUrlCache.set(cacheKey, url);
  return url;
}
async function catalogAll() {
  const pools = await Promise.all(SHEETS.map((_, i) => boxesFor(i).catch(() => [])));
  const flat = [];
  pools.forEach((boxes, sheet) => boxes.forEach(box => flat.push({ sheet, ...box })));
  return flat;
}
async function randomStar() {
  const flat = await catalogAll();
  if (!flat.length) throw new Error("找不到任何星星，請確認 assets 裡的星星圖片");
  return flat[Math.floor(Math.random() * flat.length)];
}
function sameStar(a, b) {
  return a.sheet === b.sheet && Math.abs(a.x - b.x) < 0.02 && Math.abs(a.y - b.y) < 0.02;
}

/* ================= 資料層（Firebase + 本機備份） ================= */
let userName = localStorage.getItem("temple:userName") || "";
let days = {};          // dayKey -> {quote, text, textAt, star}
let daysRef = null;
let connected = false;
const pendingKey = () => `temple:pending:${sanitizeKey(userName)}`;
const localKey = () => `temple:days:${sanitizeKey(userName)}`;

function loadLocalDays() {
  try { days = JSON.parse(localStorage.getItem(localKey()) || "{}") || {}; }
  catch { days = {}; }
}
function saveLocalDays() {
  try { localStorage.setItem(localKey(), JSON.stringify(days)); } catch {}
}
function markPending(key) {
  try {
    const list = new Set(JSON.parse(localStorage.getItem(pendingKey()) || "[]"));
    list.add(key);
    localStorage.setItem(pendingKey(), JSON.stringify([...list]));
  } catch {}
}
function flushPending() {
  if (!daysRef || !connected) return;
  let list = [];
  try { list = JSON.parse(localStorage.getItem(pendingKey()) || "[]"); } catch {}
  if (!list.length) return;
  Promise.all(list.filter(k => days[k]).map(k => daysRef.child(k).set(days[k])))
    .then(() => localStorage.setItem(pendingKey(), "[]"))
    .catch(() => {});
}
function saveDay(key) {
  saveLocalDays();
  if (daysRef) {
    daysRef.child(key).set(days[key]).catch(() => markPending(key));
    if (!connected) markPending(key);
  } else {
    markPending(key);
  }
}
function startFirebase() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    // 資料庫規則只開放 rooms/ 底下，所以放在 rooms/temple_star
    daysRef = database.ref(`rooms/temple_star/users/${sanitizeKey(userName)}/days`);
    database.ref(`rooms/temple_star/users/${sanitizeKey(userName)}/profile/name`).set(userName).catch(() => {});
    database.ref(".info/connected").on("value", snap => {
      connected = Boolean(snap.val());
      $("connDot").classList.toggle("on", connected);
      if (connected) flushPending();
    });
    daysRef.on("value", snap => {
      const remote = snap.val() || {};
      // 以「內容比較多的那份」為準合併本機與雲端
      for (const [key, record] of Object.entries(remote)) {
        const local = days[key];
        if (!local || (record.star && !local.star) || (!local.text && record.text)) days[key] = record;
      }
      saveLocalDays();
      renderAll();
    });
  } catch (error) {
    console.error(error);
    toastMessage("雲端連線失敗，紀錄先存在手機裡");
  }
}
function ownedStars() {
  // 依日期新到舊；同一顆只留最新那次（名字用最新的）
  const seen = [];
  const entries = Object.entries(days)
    .filter(([, record]) => record && record.star)
    .sort((a, b) => b[0].localeCompare(a[0]));
  for (const [key, record] of entries) {
    if (!seen.some(item => sameStar(item.star, record.star))) {
      seen.push({ key, star: record.star });
    }
  }
  return seen;
}

let sceneSignature = "";
let wanderTimer = null;

function renderScene() {

let dexToken = 0;
async function openDex() {
  $("dexOverlay").classList.remove("hide");
  $("dexGrid").innerHTML = "";
  $("dexCount").textContent = "整理中⋯";
  const token = ++dexToken;
  try {
    const catalog = await catalogAll();
    if (token !== dexToken) return;
    const owned = ownedStars();
    let ownedCount = 0;
    const cells = catalog.map(entry => {
      const match = owned.find(item => sameStar(item.star, entry));
      if (match) ownedCount++;
      const cell = document.createElement("div");
      cell.className = "star-cell" + (match ? "" : " unknown");
      cell.innerHTML = `<img alt=""><div class="n"></div>`;
      cell.querySelector(".n").textContent = match ? (match.star.name || "無名星") : "？？？";
      return { cell, entry, match };
    });
    $("dexCount").textContent = `已收集 ${ownedCount} / ${catalog.length} 顆`;
    const grid = $("dexGrid");
    cells.forEach(({ cell }) => grid.appendChild(cell));
    // 一格一格畫，不卡畫面
    for (const { cell, entry, match } of cells) {
      if (token !== dexToken) return;
      const url = await starImageUrl(entry, match ? "color" : "shadow");
      cell.querySelector("img").src = url;
    }
  } catch (error) {
    console.error(error);
    $("dexCount").textContent = "讀取星星圖失敗";
  }
}

let calCursor = null; // Date（該月一日）
function calMonthStart() {
  if (!calCursor) {
    const t = new Date(dayKey() + "T12:00:00");
    calCursor = new Date(t.getFullYear(), t.getMonth(), 1, 12);
  }
  return calCursor;
}
function renderCalendar() {
  const first = calMonthStart();
  $("calTitle").textContent = `${first.getFullYear()} 年 ${pad2(first.getMonth() + 1)} 月`;
  const grid = $("calGrid");
  grid.innerHTML = "";
  const todayK = dayKey();
  const lead = (first.getDay() + 6) % 7; // 週一開頭
  const daysInMonth = new Date(first.getFullYear(), first.getMonth() + 1, 0).getDate();
  for (let i = 0; i < lead; i++) grid.appendChild(document.createElement("span"));
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(first.getFullYear(), first.getMonth(), day, 12);
    const k = keyOfDate(d);
    const record = days[k];
    const cell = document.createElement("button");
    cell.type = "button";
    cell.className = "cal-cell" + (k === todayK ? " today" : "") + (k > todayK ? " future" : "");
    let inner = `<span class="num">${day}</span>`;
    if (record && record.star) inner += `<img alt="">`;
    else if (record && record.text) inner += `<span class="dot"></span>`;
    cell.innerHTML = inner;
    if (record && record.star) {
      starImageUrl(record.star).then(url => {
        const img = cell.querySelector("img");
        if (img) img.src = url;
      }).catch(() => {});
    }
    if (record) cell.addEventListener("click", () => openDayModal(k));
    else cell.disabled = true;
    grid.appendChild(cell);
  }
}

/* 每次抽星都隨機組合：登場動畫 × 待機動畫 × 閃亮特效 */
const ENTRY_ANIMS = [
  { name: "popIn", dur: .65, ease: "cubic-bezier(.2,1.4,.4,1)" },
  { name: "dropBounce", dur: .9, ease: "ease-out" },
  { name: "spinIn", dur: .85, ease: "ease-out" },
  { name: "flipIn", dur: .8, ease: "cubic-bezier(.2,1.2,.4,1)" },
  { name: "zoomWobble", dur: .9, ease: "ease-out" },
  { name: "slideSquash", dur: .8, ease: "ease-out" }
];
const IDLE_ANIMS = [
  { name: "floaty", dur: 3.2 },
  { name: "wiggle", dur: 1.1 },
  { name: "spinSlow", dur: 5 },
  { name: "heartbeat", dur: 1.6 },
  { name: "happyDance", dur: 2.2 },
  { name: "bigBounce", dur: 1.9 }
];
const SPARKLE_KINDS = ["burst", "rain", "fountain"];
const pick = list => list[Math.floor(Math.random() * list.length)];

function playRevealShow() {
  const img = $("revealImg");
  const entry = pick(ENTRY_ANIMS);
  const idle = pick(IDLE_ANIMS);
  img.style.animation = "none";
  void img.offsetWidth; // 重新觸發動畫
  img.style.animation =
    `${entry.name} ${entry.dur}s ${entry.ease} both, ` +
    `${idle.name} ${idle.dur}s ${entry.dur + .15}s ease-in-out infinite`;
  const kind = pick(SPARKLE_KINDS);
  sparkle(kind);
  if (kind !== "rain") setTimeout(() => sparkle("rain"), 550);
}
function sparkle(kind = "burst") {
  const box = document.querySelector(".draw-box");
  const glyphs = ["✦", "✧", "⭐", "✨", "🌟", "💫"];
  const count = kind === "burst" ? 14 : 12;
  for (let i = 0; i < count; i++) {
    const s = document.createElement("span");
    s.className = "spark" + (kind === "burst" ? "" : " " + kind);
    s.textContent = glyphs[(i + Math.floor(Math.random() * 2)) % glyphs.length];
    s.style.fontSize = `${15 + Math.random() * 14}px`;
    if (kind === "rain") {
      s.style.left = `${5 + Math.random() * 90}%`;
      s.style.top = "-4%";
      s.style.setProperty("--dy", `${260 + Math.random() * 240}px`);
      s.style.animationDelay = `${Math.random() * .6}s`;
    } else {
      const angle = Math.PI * 2 * (i / count);
      s.style.left = "50%";
      s.style.top = "40%";
      s.style.setProperty("--dx", `${Math.cos(angle) * (90 + Math.random() * 70)}px`);
      s.style.setProperty("--dy", kind === "fountain"
        ? `${-120 - Math.random() * 80}px`
        : `${Math.sin(angle) * (90 + Math.random() * 70)}px`);
    }
    box.appendChild(s);
    setTimeout(() => s.remove(), 2200);
  }
}

  if (bgmOn) bgm.play().catch(() => {});
}
$("musicBtn").addEventListener("click", () => {
  bgmOn = !bgmOn;
  localStorage.setItem("temple:bgm", bgmOn ? "on" : "off");
  updateMusicBtn();
  if (bgmOn) tryPlayBgm();
  else bgm.pause();
});
// 瀏覽器規定要先有互動才能播音樂：第一次點擊任何地方就開始
document.addEventListener("pointerdown", function firstTap() {
  tryPlayBgm();
  document.removeEventListener("pointerdown", firstTap);
});
updateMusicBtn();

/* 名字 gate 與切換使用者 */
$("gateForm").addEventListener("submit", event => {
  event.preventDefault();
  const name = $("nameInput").value.trim();
  if (!name) { toastMessage("輸入一個名字吧"); return; }
  userName = name;
  localStorage.setItem("temple:userName", name);
  $("gate").classList.add("hide");
  bootUser();
});
$("userChip").addEventListener("click", () => {
  if (!userName) return;
  if (confirm(`目前使用者：${userName}\n要切換使用者嗎？（紀錄都在雲端，不會不見）`)) {
    localStorage.removeItem("temple:userName");
    location.reload();
  }
});

function bootUser() {
  $("userChip").textContent = "☆ " + userName;
  loadLocalDays();
  renderAll();
  startFirebase();
  // 預先在背景分析星星圖，抽獎和圖鑑比較快
  setTimeout(() => SHEETS.forEach((_, i) => boxesFor(i).catch(() => {})), 800);
}
function init() {
  if (userName) bootUser();
  else $("gate").classList.remove("hide");
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
}
init();
</script>
</body>
</html>
