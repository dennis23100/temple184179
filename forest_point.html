function createEmptyScores() {
const base = {};
for (let i = 1; i <= PARTICIPANT_COUNT; i += 1) {
base[i] = 0;
}
return base;
}
function ensureScores(value) {
const next = createEmptyScores();
Object.keys(value || {}).forEach((key) => {
const index = Number(key);
const numeric = Number(value[key]);
if (Number.isInteger(index) && index >= 1 && index <= PARTICIPANT_COUNT && Number.isFinite(numeric)) {
next[index] = Math.max(0, numeric);
}
});
return next;
}
function haloMetrics(score, minScore, maxScore) {
const spread = maxScore - minScore;
const normalized = spread > 0
? (score - minScore) / spread
: (maxScore > 0 ? 0.5 : 0);
// Keep comparison readable without making the lowest group feel unlit.
const areaRatio = MIN_HALO_AREA_RATIO + normalized * (1 - MIN_HALO_AREA_RATIO);
const diameter = MAX_HALO_DIAMETER * Math.sqrt(areaRatio);
const alpha = 0.48 + normalized * 0.48;
return { diameter, alpha };
}
function formatScore(score) {
return `${Number(score || 0).toLocaleString("zh-TW")} 分`;
}
function getRankings() {
const rows = GROUP_NAMES.map((name, index) => ({
index: index + 1,
name,
score: Number(scores[index + 1] || 0)
}));
rows.sort((a, b) => b.score - a.score || a.index - b.index);
let previousScore = null;
let previousRank = 0;
rows.forEach((row, sortedIndex) => {
if (row.score !== previousScore) {
previousRank = sortedIndex + 1;
previousScore = row.score;
}
row.rank = previousRank;
});
return rows;
}
function getPodiumRows(rankings) {
return [rankings[1], rankings[0], rankings[2]].filter(Boolean);
}
function rankLabel(row) {
if (!row) return "";
if (row.rank === 1) return "第一名";
if (row.rank === 2) return "第二名";
if (row.rank === 3) return "第三名";
return `第 ${row.rank} 名`;
}
function rankClass(row) {
if (!row) return "";
if (row.rank === 1) return "is-first";
if (row.rank === 2) return "is-second";
if (row.rank === 3) return "is-third";
return "";
}
function renderSettlement() {
const rankings = getRankings();
const totalScore = rankings.reduce((sum, row) => sum + row.score, 0);
const leader = rankings[0];
settlementSummary.textContent = totalScore > 0
? `目前最高是 ${leader.name}，累積 ${formatScore(leader.score)}。這個欄位只在舞台密碼通過後可開啟，觀眾端不會看到實際分數。`
: "目前尚未加分。所有組別先並列起跑，等加分後會在這裡即時排序。";
settlementPodium.innerHTML = getPodiumRows(rankings).map((row) => `
<article class="podium-card ${rankClass(row)}"><div class="award-rank">${rankLabel(row)}</div><strong>${row.name}</strong><span>${formatScore(row.score)}</span></article>
`).join("");
rankingList.innerHTML = rankings.map((row) => `
<div class="ranking-row"><span class="rank-number">#${row.rank}</span><span>${row.name}</span><span class="score-number">${formatScore(row.score)}</span></div>
`).join("");
if (awardOverlay.classList.contains("is-open")) {
renderAwardOverlay();
}
}
function renderAwardOverlay() {
const rankings = getRankings();
awardStagePodium.innerHTML = getPodiumRows(rankings).map((row) => `
<article class="award-stage-card ${rankClass(row)}"><div class="award-rank">${rankLabel(row)}</div><strong>${row.name}</strong><span>${formatScore(row.score)}</span></article>
`).join("");
awardRankList.innerHTML = rankings.map((row) => `
<div class="award-rank-row"><span>#${row.rank} · ${formatScore(row.score)}</span><strong>${row.name}</strong></div>
`).join("");
}
async function getMeditatorAssetUrl() {
if (!meditatorAssetUrlPromise) {
meditatorAssetUrlPromise = (async () => {
try {
const directAsset = await fetch("assets/meditator.svg", { cache: "force-cache" });
if (directAsset.ok) {
return "assets/meditator.svg";
}
} catch (error) {
console.warn("Direct meditator asset unavailable, falling back to chunks.", error);
}
const chunks = await Promise.all(MEDITATOR_ASSET_PARTS.map(async (path) => {
const response = await fetch(path, { cache: "force-cache" });
if (!response.ok) {
throw new Error(`Missing meditator asset chunk: ${path}`);
}
return response.text();
}));
return `data:image/svg+xml;base64,${chunks.map((chunk) => chunk.trim()).join("")}`;
})();
}
return meditatorAssetUrlPromise;
}
async function hydrateMeditatorImages() {
try {
const assetUrl = await getMeditatorAssetUrl();
document.querySelectorAll("[data-meditator-image]").forEach((image) => {
image.src = assetUrl;
});
} catch (error) {
console.error("Meditator asset failed to load:", error);
}
}
function renderPeople() {
auraLayer.innerHTML = "";
peopleLayer.innerHTML = "";
placements.forEach((place, index) => {
const personNumber = index + 1;
const groupName = GROUP_NAMES[index];
const auraSpot = document.createElement("div");
auraSpot.className = "aura-spot";
auraSpot.id = `aura-${personNumber}`;
auraSpot.style.setProperty("--x", `${place.x}%`);
auraSpot.style.setProperty("--y", `${place.y}%`);
auraSpot.style.setProperty("--scale", place.scale);
auraSpot.innerHTML = `<div class="aura"></div>`;
const meditator = document.createElement("article");
meditator.className = "meditator";
meditator.id = `meditator-${personNumber}`;
meditator.style.setProperty("--x", `${place.x}%`);
meditator.style.setProperty("--y", `${place.y}%`);
meditator.style.setProperty("--scale", place.scale);
meditator.setAttribute("aria-label", groupName);
meditator.innerHTML = `
<div class="figure" aria-hidden="true"><img src="assets/meditator.svg" data-meditator-image alt=""></div><div class="name-tag">${groupName}</div>
`;
auraLayer.appendChild(auraSpot);
peopleLayer.appendChild(meditator);
});
}
function updatePeople() {
const scoreValues = Object.values(scores).map((score) => Number(score) || 0);
const minScore = Math.min(...scoreValues);
const maxScore = Math.max(...scoreValues);
for (let i = 1; i <= PARTICIPANT_COUNT; i += 1) {
const auraSpot = document.getElementById(`aura-${i}`);
const meditator = document.getElementById(`meditator-${i}`);
if (!auraSpot || !meditator) continue;
const score = Number(scores[i] || 0);
const previous = Number(previousScores[i] || 0);
const { diameter, alpha } = haloMetrics(score, minScore, maxScore);
auraSpot.style.setProperty("--halo", `${diameter}px`);
auraSpot.style.setProperty("--aura-alpha", alpha.toFixed(3));
if (score > previous) {
auraSpot.classList.remove("is-pulsing");
void auraSpot.offsetWidth;
auraSpot.classList.add("is-pulsing");
window.setTimeout(() => auraSpot.classList.remove("is-pulsing"), 1200);
}
}
previousScores = { ...scores };
renderSettlement();
}
function syncBackdrop() {
const hasOpenPanel = sidePanel.classList.contains("is-open") || settlementPanel.classList.contains("is-open");
if (hasOpenPanel) {
panelBackdrop.hidden = false;
window.requestAnimationFrame(() => panelBackdrop.classList.add("is-visible"));
return;
}
panelBackdrop.classList.remove("is-visible");
window.setTimeout(() => {
const stillOpen = sidePanel.classList.contains("is-open") || settlementPanel.classList.contains("is-open");
if (!stillOpen) {
panelBackdrop.hidden = true;
}
}, 220);
}
function setPanelOpen(isOpen, shouldSync = true) {
if (isOpen) {
setSettlementOpen(false, false);
}

panelToggle.setAttribute("aria-expanded", String(isOpen));
sidePanel.classList.toggle("is-open", isOpen);
sidePanel.setAttribute("aria-hidden", String(!isOpen));
if (shouldSync) {
syncBackdrop();
}
}
function setSettlementOpen(isOpen, shouldSync = true) {
if (isOpen) {
renderSettlement();
setPanelOpen(false, false);
}
settlementToggle.classList.toggle("is-active", isOpen);
settlementToggle.setAttribute("aria-expanded", String(isOpen));
settlementPanel.classList.toggle("is-open", isOpen);
settlementPanel.setAttribute("aria-hidden", String(!isOpen));
if (shouldSync) {
syncBackdrop();
}
}
function closePanels() {

function getRoomId() {
const params = new URLSearchParams(window.location.search);
const fromUrl = params.get("room");
if (fromUrl) return fromUrl;
const generated = `silent_${Math.random().toString(36).slice(2, 8)}`;
params.set("room", generated);
window.history.replaceState({}, "", `${window.location.pathname}?${params.toString()}`);
return generated;
}
function getScoreInputUrl() {
const url = new URL(window.location.href);
url.pathname = url.pathname.replace(/forest_point\.html$/, "forest_score_input.html");
url.searchParams.set("room", roomId);
return url.toString();
}

function getUnlockStorageKey() {
roomId = roomId || getRoomId();
roomIdEl.textContent = roomId;
return `silentDesertStageUnlocked:${roomId}`;
}
function startStage() {
if (appStarted) return;
appStarted = true;
gate.hidden = true;
document.body.classList.remove("is-locked");
initializeApp();
}
function initializeGate() {
const unlockStorageKey = getUnlockStorageKey();
if (window.sessionStorage.getItem(unlockStorageKey) === "true") {
startStage();
return;
}
gate.hidden = false;
gateForm.addEventListener("submit", (event) => {
event.preventDefault();
const password = gatePassword.value;
if (password !== STAGE_PASSWORD) {
gateMessage.textContent = "密碼不正確，請再試一次。";
gatePassword.value = "";
gatePassword.focus();
return;
}
window.sessionStorage.setItem(unlockStorageKey, "true");
gateMessage.textContent = "";
startStage();
});
window.requestAnimationFrame(() => gatePassword.focus());
}
async function initializeApp() {
renderPeople();
hydrateMeditatorImages();
bindControls();
try {
if (!firebase.apps.length) {
firebase.initializeApp(firebaseConfig);
}
database = firebase.database();
roomId = getRoomId();
roomIdEl.textContent = roomId;
shareUrlEl.textContent = getScoreInputUrl();
scoresRef = database.ref(`rooms/${roomId}/forestScores`);
setConnection(true, "已連線");
updatePeople();
const snapshot = await scoresRef.once("value");
if (!snapshot.exists()) {
await scoresRef.set(createEmptyScores());
} else {
scores = ensureScores(snapshot.val());
updatePeople();
}
scoresRef.on("value", (scoreSnapshot) => {
scores = ensureScores(scoreSnapshot.val());
updatePeople();
});
} catch (error) {
console.error("Silent desert stage initialization failed:", error);
setConnection(false, "連線失敗");
showToast("Firebase 連線失敗，請稍後再試");
}
}
window.addEventListener("load", initializeGate);
