<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>轉生榜加分</title><style>@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap");:root{--ink:#231817;--muted:rgba(35,24,23,0.58);--paper:rgba(255,250,238,0.84);--paper-strong:rgba(255,255,248,0.94);--coral:#df806e;--coral-deep:#b93535;--gold:#ffd86f;--line:rgba(92,43,34,0.16);--shadow:rgba(128,53,32,0.22)}*{box-sizing:border-box}html,body{min-height:100%;margin:0}body{min-height:100vh;padding:20px;display:grid;place-items:center;color:var(--ink);font-family:"Zen Maru Gothic","Noto Serif TC","Microsoft JhengHei",sans-serif;background:radial-gradient(circle at 4% 94%,rgba(255,216,111,0.4)0 8rem,transparent 18rem),radial-gradient(circle at 88% 7%,rgba(177,47,47,0.72)0 18rem,transparent 18.2rem),linear-gradient(135deg,#e88974 0%,#f3b49c 46%,#fff4db 100%);overflow-x:hidden}body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(90deg,transparent 0 46px,rgba(255,255,255,0.14)46px 48px,transparent 48px 96px),linear-gradient(0deg,transparent 0 46px,rgba(255,255,255,0.11)46px 48px,transparent 48px 96px);opacity:0.7}button,input,select{font:inherit}.card{position:relative;z-index:1;width:min(560px,100%);padding:clamp(24px,5vw,42px);border:1px solid var(--line);border-radius:36px;background:linear-gradient(180deg,rgba(255,255,248,0.9),rgba(255,240,219,0.78));box-shadow:0 36px 90px var(--shadow),inset 0 0 0 1px rgba(255,255,255,0.56);backdrop-filter:blur(22px);overflow:hidden}.card::before,.card::after{content:"";position:absolute;pointer-events:none}.card::before{right:-32px;top:-32px;width:160px;height:160px;background:linear-gradient(var(--gold)0 0)center / 34% 100% no-repeat,linear-gradient(var(--gold)0 0)center / 100% 34% no-repeat;opacity:0.28}.card::after{left:-24px;bottom:28px;width:112px;height:112px;background:linear-gradient(#ffd4cd 0 0)center / 34% 100% no-repeat,linear-gradient(#ffd4cd 0 0)center / 100% 34% no-repeat;opacity:0.38}.kicker{position:relative;display:inline-flex;margin-bottom:14px;padding:7px 13px;border:1px solid rgba(185,53,53,0.16);border-radius:999px;background:rgba(255,255,248,0.58);color:rgba(35,24,23,0.58);font-size:12px;font-weight:900;letter-spacing:0.22em;text-transform:uppercase}h1{position:relative;margin:0;font-family:"Noto Serif TC",serif;font-size:clamp(30px,7vw,46px);line-height:1.08;letter-spacing:0.08em}.status-row{position:relative;display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 26px}.pill{min-height:38px;display:inline-flex;align-items:center;gap:8px;padding:0 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,248,0.58);color:rgba(35,24,23,0.66);font-size:13px}.dot{width:8px;height:8px;border-radius:50%;background:#758e52;box-shadow:0 0 16px rgba(117,142,82,0.54)}.dot.is-offline{background:#bd4f43;box-shadow:0 0 16px rgba(189,79,67,0.52)}form{position:relative;display:grid;gap:20px}.field{display:grid;gap:9px}label{color:rgba(35,24,23,0.88);font-weight:900}select,input{width:100%;min-height:58px;border:1px solid rgba(92,43,34,0.16);border-radius:20px;background:var(--paper-strong);color:var(--ink);padding:0 16px;outline:none;transition:border-color 160ms ease,box-shadow 160ms ease,transform 160ms ease}select:focus,input:focus{border-color:rgba(185,53,53,0.38);box-shadow:0 0 0 4px rgba(185,53,53,0.12);transform:translateY(-1px)}.quick-points{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.chip{min-height:44px;border:1px solid rgba(92,43,34,0.14);border-radius:999px;background:rgba(255,255,248,0.58);color:rgba(35,24,23,0.78);cursor:pointer;font-weight:900;transition:transform 160ms ease,background 160ms ease,border-color 160ms ease}.chip:hover{transform:translateY(-1px);border-color:rgba(185,53,53,0.3);background:rgba(255,255,248,0.86)}.submit-button{min-height:60px;border:1px solid rgba(185,53,53,0.24);border-radius:999px;background:linear-gradient(135deg,#ffe374,#ffb36f 58%,#ef806b);color:#2b1713;cursor:pointer;font-weight:900;box-shadow:0 18px 42px rgba(190,79,67,0.18);transition:transform 170ms ease,filter 170ms ease,opacity 170ms ease}.submit-button:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.02)}.submit-button:disabled{cursor:not-allowed;opacity:0.58;box-shadow:none}.toast{position:fixed;left:50%;bottom:22px;z-index:4;width:min(430px,calc(100vw - 32px));padding:13px 16px;border:1px solid var(--line);border-radius:22px;background:rgba(255,250,238,0.86);color:rgba(35,24,23,0.82);text-align:center;box-shadow:0 18px 52px var(--shadow);backdrop-filter:blur(16px);transform:translate(-50%,22px);opacity:0;pointer-events:none;transition:opacity 220ms ease,transform 220ms ease}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:540px){body{padding:14px;align-items:start}.card{margin-top:10px;border-radius:28px}.quick-points{grid-template-columns:repeat(2,1fr)}}</style></head><body><main class="card"><div class="kicker">Rebirth Rank Input</div><h1>轉生榜加分</h1><div class="status-row"><div class="pill"><span class="dot is-offline" id="statusDot"></span><span id="connectionStatus">連線中</span></div><div class="pill">房間 <span id="roomId">讀取中</span></div></div><form id="scoreForm"><div class="field"><label for="personSelect">選擇組別</label><select id="personSelect" required><option value="">請選擇</option></select></div><div class="field"><label for="scoreInput">加分數</label><input id="scoreInput" type="number" min="1" max="10000" value="100" inputmode="numeric" required></div><div class="quick-points" aria-label="快速選擇分數"><button class="chip" type="button" data-points="10">+10</button><button class="chip" type="button" data-points="50">+50</button><button class="chip" type="button" data-points="100">+100</button><button class="chip" type="button" data-points="300">+300</button></div><button class="submit-button" id="submitButton" type="submit" disabled>送出加分</button></form></main><div class="toast" id="toast" role="status" aria-live="polite"></div><script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script><script>
const firebaseConfig = {
apiKey: "AIzaSyD5ytWrUOI6UIUBIcKpF3fyODQR2pXFMmY",
authDomain: "score-calculation-ef584.firebaseapp.com",
databaseURL: "https://score-calculation-ef584-default-rtdb.firebaseio.com",
projectId: "score-calculation-ef584",
storageBucket: "score-calculation-ef584.firebasestorage.app",
messagingSenderId: "634074718336",
appId: "1:634074718336:web:38960860ad796197a50665",
measurementId: "G-R6NT2QJQSC"
};
const GROUP_NAMES = ["第一組", "第二組", "第三組", "第四組", "第五組", "第六組", "第七組", "第八組", "第九組", "第十組", "第十一組"];
const PARTICIPANT_COUNT = GROUP_NAMES.length;
const personSelect = document.getElementById("personSelect");
const scoreInput = document.getElementById("scoreInput");
const submitButton = document.getElementById("submitButton");
const scoreForm = document.getElementById("scoreForm");
const connectionStatusEl = document.getElementById("connectionStatus");
const statusDotEl = document.getElementById("statusDot");
const roomIdEl = document.getElementById("roomId");
const toastEl = document.getElementById("toast");
let database;
let scoresRef;
let roomId = "";
let isConnected = false;
let isSubmitting = false;
let toastTimer = null;
function createEmptyScores() {
const base = {};
for (let i = 1; i <= PARTICIPANT_COUNT; i += 1) {
base[i] = 0;
}
return base;
}
function renderOptions() {
GROUP_NAMES.forEach((name, index) => {
const option = document.createElement("option");
option.value = String(index + 1);
option.textContent = name;
personSelect.appendChild(option);
});
}
function setConnection(connected, message) {
isConnected = connected;
connectionStatusEl.textContent = message;
statusDotEl.classList.toggle("is-offline", !connected);
submitButton.disabled = !isConnected || isSubmitting;
}
function showToast(message) {
toastEl.textContent = message;
toastEl.classList.add("show");
window.clearTimeout(toastTimer);
toastTimer = window.setTimeout(() => toastEl.classList.remove("show"), 2700);
}
function getRoomId() {
const params = new URLSearchParams(window.location.search);
return params.get("room") || "";
}
function bindQuickPoints() {
document.querySelectorAll("[data-points]").forEach((button) => {
button.addEventListener("click", () => {
scoreInput.value = button.dataset.points;
scoreInput.focus();
});
});
}
async function addScore(event) {
event.preventDefault();
if (!isConnected || isSubmitting || !scoresRef) {
showToast("請等連線完成再送出");
return;
}
const person = Number(personSelect.value);
const points = Number(scoreInput.value);
if (!Number.isInteger(person) || person < 1 || person > PARTICIPANT_COUNT) {
showToast("請先選擇組別");
return;
}
if (!Number.isFinite(points) || points <= 0 || points > 10000) {
showToast("請輸入 1 到 10000 之間的分數");
return;
}
try {
isSubmitting = true;
submitButton.disabled = true;
const personRef = scoresRef.child(String(person));
await new Promise((resolve, reject) => {
personRef.transaction(
(currentValue) => (Number(currentValue) || 0) + points,
(error, committed) => {
if (error) {
reject(error);
return;
}
if (!committed) {
reject(new Error("transaction_not_committed"));
return;
}
resolve();
}
);
});
showToast(`${GROUP_NAMES[person - 1]} 修煉值 +${points}`);
personSelect.value = "";
scoreInput.value = "100";
} catch (error) {
console.error("Failed to add rebirth score:", error);
showToast("加分失敗，請再試一次");
} finally {
isSubmitting = false;
submitButton.disabled = !isConnected;
}
}
async function initializeApp() {
renderOptions();
bindQuickPoints();
scoreForm.addEventListener("submit", addScore);
roomId = getRoomId();
if (!roomId) {
roomIdEl.textContent = "未指定";
setConnection(false, "缺少 room");
showToast("請從轉生榜舞台端複製加分連結");
return;
}
roomIdEl.textContent = roomId;
try {
if (!firebase.apps.length) {
firebase.initializeApp(firebaseConfig);
}
database = firebase.database();
scoresRef = database.ref(`rooms/${roomId}/rebirthScores`);
const snapshot = await scoresRef.once("value");
if (!snapshot.exists()) {
await scoresRef.set(createEmptyScores());
}
setConnection(true, "已連線");
} catch (error) {
console.error("Rebirth score input initialization failed:", error);
setConnection(false, "連線失敗");
showToast("Firebase 連線失敗，請稍後再試");
}
}
window.addEventListener("load", initializeApp);
</script></body></html>
