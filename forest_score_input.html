<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>默加分</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Zen+Kurenaido&display=swap");

        :root {
            --ink: #22231d;
            --muted: rgba(34, 35, 29, 0.58);
            --paper: rgba(255, 255, 255, 0.76);
            --paper-strong: rgba(255, 255, 255, 0.92);
            --sand: #efe6d6;
            --warm: #c6ad72;
            --line: rgba(58, 55, 43, 0.15);
            --shadow: rgba(104, 91, 64, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            min-height: 100vh;
            padding: 22px;
            display: grid;
            place-items: center;
            color: var(--ink);
            font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.96) 0 14rem, transparent 34rem),
                linear-gradient(180deg, #ffffff 0%, #fbfaf6 42%, #ece3d2 100%);
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                radial-gradient(ellipse 90% 18% at 44% 82%, rgba(221, 209, 184, 0.46) 0 42%, transparent 43%),
                radial-gradient(ellipse 72% 14% at 78% 76%, rgba(235, 226, 207, 0.68) 0 48%, transparent 49%),
                radial-gradient(ellipse 68% 12% at 10% 74%, rgba(242, 236, 224, 0.84) 0 52%, transparent 53%);
            z-index: -2;
        }

        body::after {
            background:
                repeating-linear-gradient(173deg, rgba(167, 151, 112, 0.08) 0 1px, transparent 1px 18px),
                radial-gradient(ellipse at 50% 18%, rgba(255, 255, 255, 0.68), transparent 48%);
            opacity: 0.42;
            mix-blend-mode: multiply;
            z-index: -1;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .card {
            position: relative;
            z-index: 1;
            width: min(560px, 100%);
            padding: clamp(24px, 5vw, 42px);
            border: 1px solid rgba(58, 55, 43, 0.14);
            border-radius: 36px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(248, 243, 233, 0.78));
            box-shadow:
                0 36px 90px var(--shadow),
                inset 0 0 0 1px rgba(255, 255, 255, 0.56);
            backdrop-filter: blur(22px);
        }

        .card::before {
            content: "默";
            position: absolute;
            right: clamp(22px, 5vw, 42px);
            top: clamp(22px, 5vw, 42px);
            color: rgba(34, 35, 29, 0.08);
            font-size: clamp(84px, 22vw, 150px);
            line-height: 0.8;
            pointer-events: none;
        }

        .kicker {
            display: inline-flex;
            margin-bottom: 14px;
            padding: 7px 13px;
            border: 1px solid rgba(150, 132, 89, 0.18);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.54);
            color: rgba(34, 35, 29, 0.58);
            font-family: "Zen Kurenaido", "Noto Serif TC", serif;
            font-size: 12px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        h1 {
            position: relative;
            margin: 0;
            color: var(--ink);
            font-size: clamp(38px, 8vw, 64px);
            line-height: 1;
            letter-spacing: 0.08em;
        }

        .subtitle {
            position: relative;
            margin: 16px 0 24px;
            color: var(--muted);
            line-height: 1.85;
            font-size: 15px;
        }

        .status-row {
            position: relative;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 26px;
        }

        .pill {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 13px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.56);
            color: rgba(34, 35, 29, 0.66);
            font-size: 13px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #7c8a68;
            box-shadow: 0 0 16px rgba(124, 138, 104, 0.54);
        }

        .dot.is-offline {
            background: #be8a75;
            box-shadow: 0 0 16px rgba(190, 138, 117, 0.5);
        }

        form {
            position: relative;
            display: grid;
            gap: 20px;
        }

        .field {
            display: grid;
            gap: 9px;
        }

        label {
            color: rgba(34, 35, 29, 0.88);
            font-weight: 700;
        }

        select,
        input {
            width: 100%;
            min-height: 56px;
            border: 1px solid rgba(58, 55, 43, 0.15);
            border-radius: 20px;
            background: var(--paper-strong);
            color: var(--ink);
            padding: 0 16px;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        select:focus,
        input:focus {
            border-color: rgba(174, 150, 86, 0.58);
            box-shadow: 0 0 0 4px rgba(174, 150, 86, 0.12);
            transform: translateY(-1px);
        }

        .quick-points {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .chip {
            min-height: 42px;
            border: 1px solid rgba(58, 55, 43, 0.13);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.54);
            color: rgba(34, 35, 29, 0.72);
            cursor: pointer;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .chip:hover {
            transform: translateY(-1px);
            border-color: rgba(174, 150, 86, 0.38);
            background: rgba(255, 255, 255, 0.82);
        }

        .submit-button {
            min-height: 58px;
            border: 1px solid rgba(174, 150, 86, 0.36);
            border-radius: 999px;
            background: linear-gradient(135deg, #d8c78f, #efe4bd);
            color: #242015;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 18px 42px rgba(177, 151, 83, 0.18);
            transition: transform 170ms ease, filter 170ms ease, opacity 170ms ease;
        }

        .submit-button:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }

        .submit-button:disabled {
            cursor: not-allowed;
            opacity: 0.58;
            box-shadow: none;
        }

        .note {
            position: relative;
            margin: 22px 0 0;
            color: rgba(34, 35, 29, 0.5);
            line-height: 1.8;
            font-size: 13px;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 22px;
            z-index: 4;
            width: min(430px, calc(100vw - 32px));
            padding: 13px 16px;
            border: 1px solid rgba(58, 55, 43, 0.14);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.82);
            color: rgba(34, 35, 29, 0.82);
            text-align: center;
            box-shadow: 0 18px 52px var(--shadow);
            backdrop-filter: blur(16px);
            transform: translate(-50%, 22px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease, transform 220ms ease;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        @media (max-width: 540px) {
            body {
                padding: 14px;
                align-items: start;
            }

            .card {
                border-radius: 28px;
                margin-top: 12px;
            }

            .quick-points {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="kicker">Silent Desert Input</div>
        <h1>默加分</h1>
        <p class="subtitle">選擇一組並送出分數。舞台端不會顯示數字，只會讓那一組背後的光圈依房間內相對分數變化。</p>

        <div class="status-row">
            <div class="pill">
                <span class="dot is-offline" id="statusDot"></span>
                <span id="connectionStatus">連線中</span>
            </div>
            <div class="pill">房間 <span id="roomId">讀取中</span></div>
        </div>

        <form id="scoreForm">
            <div class="field">
                <label for="personSelect">選擇組別</label>
                <select id="personSelect" required>
                    <option value="">請選擇</option>
                </select>
            </div>

            <div class="field">
                <label for="scoreInput">加分數</label>
                <input id="scoreInput" type="number" min="1" max="10000" value="10" inputmode="numeric" required>
            </div>

            <div class="quick-points" aria-label="快速選擇分數">
                <button class="chip" type="button" data-points="1">+1</button>
                <button class="chip" type="button" data-points="5">+5</button>
                <button class="chip" type="button" data-points="10">+10</button>
                <button class="chip" type="button" data-points="50">+50</button>
            </div>

            <button class="submit-button" id="submitButton" type="submit" disabled>送出加分</button>
        </form>

        <p class="note">這個頁面只負責加分，不提供即時分數或排名；想看光圈變化，請開啟同一個 room 的「默」舞台端。</p>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5ytWrUOI6UIUBIcKpF3fyODQR2pXFMmY",
            authDomain: "score-calculation-ef584.firebaseapp.com",
            databaseURL: "https://score-calculation-ef584-default-rtdb.firebaseio.com",
            projectId: "score-calculation-ef584",
            storageBucket: "score-calculation-ef584.firebasestorage.app",
            messagingSenderId: "634074718336",
            appId: "1:634074718336:web:38960860ad796197a50665",
            measurementId: "G-R6NT2QJQSC"
        };

        const GROUP_NAMES = ["第一組", "第二組", "第三組", "第四組", "第五組", "第六組", "第七組", "第八組", "第九組", "第十組", "第十一組", "第十二組"];
        const PARTICIPANT_COUNT = GROUP_NAMES.length;
        const personSelect = document.getElementById("personSelect");
        const scoreInput = document.getElementById("scoreInput");
        const submitButton = document.getElementById("submitButton");
        const scoreForm = document.getElementById("scoreForm");
        const connectionStatusEl = document.getElementById("connectionStatus");
        const statusDotEl = document.getElementById("statusDot");
        const roomIdEl = document.getElementById("roomId");
        const toastEl = document.getElementById("toast");

        let database;
        let scoresRef;
        let roomId = "";
        let isConnected = false;
        let isSubmitting = false;
        let toastTimer = null;

        function createEmptyScores() {
            const base = {};
            for (let i = 1; i <= PARTICIPANT_COUNT; i += 1) {
                base[i] = 0;
            }
            return base;
        }

        function renderOptions() {
            GROUP_NAMES.forEach((name, index) => {
                const option = document.createElement("option");
                option.value = String(index + 1);
                option.textContent = name;
                personSelect.appendChild(option);
            });
        }

        function setConnection(connected, message) {
            isConnected = connected;
            connectionStatusEl.textContent = message;
            statusDotEl.classList.toggle("is-offline", !connected);
            submitButton.disabled = !isConnected || isSubmitting;
        }

        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add("show");
            window.clearTimeout(toastTimer);
            toastTimer = window.setTimeout(() => toastEl.classList.remove("show"), 2700);
        }

        function getRoomId() {
            const params = new URLSearchParams(window.location.search);
            return params.get("room") || "";
        }

        function bindQuickPoints() {
            document.querySelectorAll("[data-points]").forEach((button) => {
                button.addEventListener("click", () => {
                    scoreInput.value = button.dataset.points;
                    scoreInput.focus();
                });
            });
        }

        async function addScore(event) {
            event.preventDefault();

            if (!isConnected || isSubmitting || !scoresRef) {
                showToast("請等連線完成再送出");
                return;
            }

            const person = Number(personSelect.value);
            const points = Number(scoreInput.value);

            if (!Number.isInteger(person) || person < 1 || person > PARTICIPANT_COUNT) {
                showToast("請先選擇組別");
                return;
            }

            if (!Number.isFinite(points) || points <= 0 || points > 10000) {
                showToast("請輸入 1 到 10000 之間的分數");
                return;
            }

            try {
                isSubmitting = true;
                submitButton.disabled = true;

                const personRef = scoresRef.child(String(person));
                await new Promise((resolve, reject) => {
                    personRef.transaction(
                        (currentValue) => (Number(currentValue) || 0) + points,
                        (error, committed) => {
                            if (error) {
                                reject(error);
                                return;
                            }

                            if (!committed) {
                                reject(new Error("transaction_not_committed"));
                                return;
                            }

                            resolve();
                        }
                    );
                });

                showToast(`${GROUP_NAMES[person - 1]} 的光圈收到加分`);
                personSelect.value = "";
                scoreInput.value = "10";
            } catch (error) {
                console.error("Failed to add silent desert score:", error);
                showToast("加分失敗，請再試一次");
            } finally {
                isSubmitting = false;
                submitButton.disabled = !isConnected;
            }
        }

        async function initializeApp() {
            renderOptions();
            bindQuickPoints();
            scoreForm.addEventListener("submit", addScore);

            roomId = getRoomId();
            if (!roomId) {
                roomIdEl.textContent = "未指定";
                setConnection(false, "缺少 room");
                showToast("請從「默」舞台端複製加分連結");
                return;
            }

            roomIdEl.textContent = roomId;

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }

                database = firebase.database();
                scoresRef = database.ref(`rooms/${roomId}/forestScores`);

                const snapshot = await scoresRef.once("value");
                if (!snapshot.exists()) {
                    await scoresRef.set(createEmptyScores());
                }

                setConnection(true, "已連線");
            } catch (error) {
                console.error("Silent desert score input initialization failed:", error);
                setConnection(false, "連線失敗");
                showToast("Firebase 連線失敗，請稍後再試");
            }
        }

        window.addEventListener("load", initializeApp);
    </script>
</body>
</html>
