<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森息光環加分</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Zen+Kurenaido&display=swap");

        :root {
            --ink: #f6f1e6;
            --paper: rgba(246, 241, 230, 0.92);
            --muted: #626b5d;
            --deep: #101b14;
            --moss: #6f8664;
            --gold: #d6c08a;
            --line: rgba(16, 27, 20, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            min-height: 100vh;
            padding: 22px;
            display: grid;
            place-items: center;
            color: var(--deep);
            font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
            background:
                radial-gradient(circle at 50% 0%, rgba(244, 229, 188, 0.36), transparent 22rem),
                radial-gradient(circle at 12% 70%, rgba(143, 172, 126, 0.22), transparent 18rem),
                linear-gradient(160deg, #152119 0%, #344333 48%, #8d856f 100%);
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                linear-gradient(90deg, transparent 0 7%, rgba(12, 21, 15, 0.22) 7.1% 7.45%, transparent 7.7% 26%),
                linear-gradient(90deg, transparent 0 58%, rgba(12, 21, 15, 0.2) 58.2% 58.55%, transparent 58.8% 84%),
                radial-gradient(ellipse at 50% 82%, rgba(255, 255, 245, 0.18), transparent 38%);
            opacity: 0.78;
        }

        body::after {
            background: linear-gradient(180deg, transparent, rgba(7, 12, 9, 0.25));
        }

        button,
        input,
        select {
            font: inherit;
        }

        .card {
            position: relative;
            z-index: 1;
            width: min(560px, 100%);
            padding: clamp(24px, 5vw, 42px);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 36px;
            background:
                linear-gradient(180deg, rgba(255, 252, 242, 0.94), rgba(235, 230, 211, 0.9));
            box-shadow:
                0 36px 90px rgba(7, 13, 8, 0.32),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(22px);
        }

        .kicker {
            display: inline-flex;
            margin-bottom: 14px;
            padding: 7px 13px;
            border: 1px solid rgba(111, 134, 100, 0.2);
            border-radius: 999px;
            background: rgba(111, 134, 100, 0.08);
            color: #65775c;
            font-family: "Zen Kurenaido", "Noto Serif TC", serif;
            font-size: 12px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            color: #142016;
            font-size: clamp(34px, 8vw, 58px);
            line-height: 1;
            letter-spacing: 0.04em;
        }

        .subtitle {
            margin: 16px 0 24px;
            color: var(--muted);
            line-height: 1.8;
            font-size: 15px;
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 26px;
        }

        .pill {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 13px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.52);
            color: #566052;
            font-size: 13px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #6f8664;
            box-shadow: 0 0 16px rgba(111, 134, 100, 0.6);
        }

        .dot.is-offline {
            background: #b07a67;
            box-shadow: 0 0 16px rgba(176, 122, 103, 0.52);
        }

        form {
            display: grid;
            gap: 20px;
        }

        .field {
            display: grid;
            gap: 9px;
        }

        label {
            color: #263126;
            font-weight: 700;
        }

        select,
        input {
            width: 100%;
            min-height: 56px;
            border: 1px solid rgba(38, 49, 38, 0.16);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.76);
            color: #172219;
            padding: 0 16px;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        select:focus,
        input:focus {
            border-color: rgba(111, 134, 100, 0.58);
            box-shadow: 0 0 0 4px rgba(111, 134, 100, 0.12);
            transform: translateY(-1px);
        }

        .quick-points {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .chip {
            min-height: 42px;
            border: 1px solid rgba(38, 49, 38, 0.12);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.5);
            color: #4b5548;
            cursor: pointer;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .chip:hover {
            transform: translateY(-1px);
            border-color: rgba(111, 134, 100, 0.42);
            background: rgba(111, 134, 100, 0.1);
        }

        .submit-button {
            min-height: 58px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, #17261b, #6f8664 52%, #d5c08b);
            color: #fffaf0;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 18px 42px rgba(63, 78, 55, 0.28);
            transition: transform 170ms ease, filter 170ms ease, opacity 170ms ease;
        }

        .submit-button:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.04);
        }

        .submit-button:disabled {
            cursor: not-allowed;
            opacity: 0.58;
            box-shadow: none;
        }

        .note {
            margin: 22px 0 0;
            color: #747b70;
            line-height: 1.8;
            font-size: 13px;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 22px;
            z-index: 4;
            width: min(430px, calc(100vw - 32px));
            padding: 13px 16px;
            border-radius: 22px;
            background: rgba(14, 22, 15, 0.82);
            color: var(--ink);
            text-align: center;
            box-shadow: 0 18px 52px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(16px);
            transform: translate(-50%, 22px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease, transform 220ms ease;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        @media (max-width: 540px) {
            body {
                padding: 14px;
                align-items: start;
            }

            .card {
                border-radius: 28px;
                margin-top: 12px;
            }

            .quick-points {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="kicker">Forest Aura Input</div>
        <h1>森息加分</h1>
        <p class="subtitle">選擇一位靜坐者並送出分數。舞台端不會顯示數字，只會讓那一位背後的光圈慢慢變大。</p>

        <div class="status-row">
            <div class="pill">
                <span class="dot is-offline" id="statusDot"></span>
                <span id="connectionStatus">連線中</span>
            </div>
            <div class="pill">房間 <span id="roomId">讀取中</span></div>
        </div>

        <form id="scoreForm">
            <div class="field">
                <label for="personSelect">選擇靜坐者</label>
                <select id="personSelect" required>
                    <option value="">請選擇</option>
                </select>
            </div>

            <div class="field">
                <label for="scoreInput">加分數</label>
                <input id="scoreInput" type="number" min="1" max="10000" value="10" inputmode="numeric" required>
            </div>

            <div class="quick-points" aria-label="快速選擇分數">
                <button class="chip" type="button" data-points="1">+1</button>
                <button class="chip" type="button" data-points="5">+5</button>
                <button class="chip" type="button" data-points="10">+10</button>
                <button class="chip" type="button" data-points="50">+50</button>
            </div>

            <button class="submit-button" id="submitButton" type="submit" disabled>送出加分</button>
        </form>

        <p class="note">這個頁面只負責加分，不提供即時分數或排名；想看光圈變化，請開啟同一個 room 的森林舞台端。</p>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5ytWrUOI6UIUBIcKpF3fyODQR2pXFMmY",
            authDomain: "score-calculation-ef584.firebaseapp.com",
            databaseURL: "https://score-calculation-ef584-default-rtdb.firebaseio.com",
            projectId: "score-calculation-ef584",
            storageBucket: "score-calculation-ef584.firebasestorage.app",
            messagingSenderId: "634074718336",
            appId: "1:634074718336:web:38960860ad796197a50665",
            measurementId: "G-R6NT2QJQSC"
        };

        const PARTICIPANT_COUNT = 12;
        const personSelect = document.getElementById("personSelect");
        const scoreInput = document.getElementById("scoreInput");
        const submitButton = document.getElementById("submitButton");
        const scoreForm = document.getElementById("scoreForm");
        const connectionStatusEl = document.getElementById("connectionStatus");
        const statusDotEl = document.getElementById("statusDot");
        const roomIdEl = document.getElementById("roomId");
        const toastEl = document.getElementById("toast");

        let database;
        let scoresRef;
        let roomId = "";
        let isConnected = false;
        let isSubmitting = false;
        let toastTimer = null;

        function createEmptyScores() {
            const base = {};
            for (let i = 1; i <= PARTICIPANT_COUNT; i += 1) {
                base[i] = 0;
            }
            return base;
        }

        function renderOptions() {
            for (let i = 1; i <= PARTICIPANT_COUNT; i += 1) {
                const option = document.createElement("option");
                option.value = String(i);
                option.textContent = `第 ${String(i).padStart(2, "0")} 位`;
                personSelect.appendChild(option);
            }
        }

        function setConnection(connected, message) {
            isConnected = connected;
            connectionStatusEl.textContent = message;
            statusDotEl.classList.toggle("is-offline", !connected);
            submitButton.disabled = !isConnected || isSubmitting;
        }

        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add("show");
            window.clearTimeout(toastTimer);
            toastTimer = window.setTimeout(() => toastEl.classList.remove("show"), 2700);
        }

        function getRoomId() {
            const params = new URLSearchParams(window.location.search);
            return params.get("room") || "";
        }

        function bindQuickPoints() {
            document.querySelectorAll("[data-points]").forEach((button) => {
                button.addEventListener("click", () => {
                    scoreInput.value = button.dataset.points;
                    scoreInput.focus();
                });
            });
        }

        async function addScore(event) {
            event.preventDefault();

            if (!isConnected || isSubmitting || !scoresRef) {
                showToast("請等連線完成再送出");
                return;
            }

            const person = Number(personSelect.value);
            const points = Number(scoreInput.value);

            if (!Number.isInteger(person) || person < 1 || person > PARTICIPANT_COUNT) {
                showToast("請先選擇靜坐者");
                return;
            }

            if (!Number.isFinite(points) || points <= 0 || points > 10000) {
                showToast("請輸入 1 到 10000 之間的分數");
                return;
            }

            try {
                isSubmitting = true;
                submitButton.disabled = true;

                const personRef = scoresRef.child(String(person));
                await new Promise((resolve, reject) => {
                    personRef.transaction(
                        (currentValue) => (Number(currentValue) || 0) + points,
                        (error, committed) => {
                            if (error) {
                                reject(error);
                                return;
                            }

                            if (!committed) {
                                reject(new Error("transaction_not_committed"));
                                return;
                            }

                            resolve();
                        }
                    );
                });

                showToast(`第 ${String(person).padStart(2, "0")} 位的光圈收到加分`);
                personSelect.value = "";
                scoreInput.value = "10";
            } catch (error) {
                console.error("Failed to add forest score:", error);
                showToast("加分失敗，請再試一次");
            } finally {
                isSubmitting = false;
                submitButton.disabled = !isConnected;
            }
        }

        async function initializeApp() {
            renderOptions();
            bindQuickPoints();
            scoreForm.addEventListener("submit", addScore);

            roomId = getRoomId();
            if (!roomId) {
                roomIdEl.textContent = "未指定";
                setConnection(false, "缺少 room");
                showToast("請從森林舞台端複製加分連結");
                return;
            }

            roomIdEl.textContent = roomId;

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }

                database = firebase.database();
                scoresRef = database.ref(`rooms/${roomId}/forestScores`);

                const snapshot = await scoresRef.once("value");
                if (!snapshot.exists()) {
                    await scoresRef.set(createEmptyScores());
                }

                setConnection(true, "已連線");
            } catch (error) {
                console.error("Forest score input initialization failed:", error);
                setConnection(false, "連線失敗");
                showToast("Firebase 連線失敗，請稍後再試");
            }
        }

        window.addEventListener("load", initializeApp);
    </script>
</body>
</html>
